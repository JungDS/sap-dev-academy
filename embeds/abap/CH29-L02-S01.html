<!DOCTYPE html>
<!-- CH29-L02-S01 — 엔진: inject-slots(enh) · _engine/_base.css. Enhancement Point에 ENHANCEMENT 코드 끼우기. -->
<html lang="ko">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enhancement Point · CH29-L02-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/inject-slots.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">표준 라인 사이에 끼우기 — Enhancement Point</p>
  <p class="lead">표준이 코드 중간에 마련해 둔 <b>Enhancement Point</b>에 <code>ENHANCEMENT … ENDENHANCEMENT</code> 블록으로 내 코드를 <b>추가</b>합니다. 토글로 적용/해제 — 표준 라인은 한 줄도 안 바뀝니다.</p>
  <div class="bar"><button class="toggle" id="toggle" type="button"><span class="sw"></span><span id="swtxt">확장 적용: OFF</span></button><span class="badge">표준 소스 변경 0줄</span></div>
  <div class="prog" id="prog"></div>
  <div class="note">💡 <b>Point</b>=그 자리에 코드 <b>추가</b> / <b>Section</b>=표준 블록을 내 것으로 <b>교체</b>(위험, 가급적 Point). Enhancement Implementation을 <b>활성화</b>해야 동작합니다.</div>
  <script type="application/json" id="is-cfg">
  {
    "progName": "표준 금액 처리 루틴",
    "slotLabel": "ENHANCEMENT-POINT ep_amount — 표준이 심어 둔 '추가' 지점",
    "lines": [
      { "t": "std", "x": "  lv_amount = lv_qty * lv_price." },
      { "t": "std", "x": "  \" ENHANCEMENT-POINT ep_amount SPOTS es_amount ." },
      { "t": "slot" },
      { "t": "std", "x": "  MODIFY ztab FROM ls_data." }
    ],
    "my": [
      "  ENHANCEMENT zenh_my_logic.   \" 표준이 마련한 지점",
      "    IF lv_amount > 10000.",
      "      ls_data-flag_big = abap_true.   \" 추가 처리",
      "    ENDIF.",
      "  ENDENHANCEMENT."
    ],
    "emptyMsg": "(확장 없음 — 표준 흐름 그대로)"
  }
  </script>
</div>
<script src="../_engine/inject-slots.js" defer></script>
</body>
</html>
