<!DOCTYPE html>
<!-- CH01-L03-S01 — 엔진: syntax-toggle-lab + _autoheight · _engine/_base.css. 문법 상태 실험기.
     마침표 제거/별표 위치/키워드 소문자/인라인 주석을 *로 → 구문 검사 램프. config=window.STL_CFG.
     게이팅: REPORT·주석·마침표만(CH01-L03까지) — WRITE·변수 미사용. -->
<html lang="ko" data-eng="syntax-toggle-lab">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문법 상태 실험기 · CH01-L03-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/syntax-toggle-lab.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">문법 상태 실험기 <small>(일부러 깨뜨려 보기)</small></p>
  <p class="lead">아래 두 줄짜리 프로그램을 토글로 <b>일부러 깨뜨려</b> 보세요. 구문 검사 램프가 어떤 오류를, 왜 잡아내는지 눈으로 확인합니다 — 실수는 여기서 미리 겪는 게 쌉니다.</p>
  <div data-stl></div>
</div>
<script>
window.STL_CFG = {
  toggles: [
    { id:'period',  label:'마침표(.) 지우기',        bad:true,
      msg:'<b>문장이 끝나지 않았다</b> — ABAP은 줄바꿈이 아니라 <b>마침표(.)</b>가 문장의 끝이다. 다음 줄까지 한 문장으로 붙어 엉뚱한 오류가 난다.' },
    { id:'star',    label:'별표(*)를 한 칸 뒤로',     bad:true,
      msg:'<code>*</code> 전체 줄 주석은 <b>첫 칸(컬럼 1)</b>에서만 통한다 — 한 칸이라도 밀리면 주석이 아니라 코드로 읽혀 오류.' },
    { id:'midstar', label:'인라인 주석을 *로 바꾸기', bad:true,
      msg:'줄 <b>중간</b> 주석은 큰따옴표(<code>"</code>)만 — <code>*</code>는 첫 칸 전용이라 문장 중간에선 오류가 난다.' },
    { id:'lower',   label:'키워드를 소문자로',        bad:false,
      msg:'<code>report</code> = <code>REPORT</code> — 키워드는 대소문자를 <b>가리지 않는다</b>. 다만 관례상 키워드는 대문자로 쓴다.' }
  ],
  note: '램프가 빨간 상태로는 <b>활성화가 거부</b>됩니다 — 저장(초안)은 되어도 실행본이 안 바뀌는 이유. 토글을 모두 끄면 초록 램프(활성화 가능)로 돌아옵니다.'
};
</script>
<script src="../_engine/syntax-toggle-lab.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
