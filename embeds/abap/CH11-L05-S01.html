<!DOCTYPE html>
<!-- CH11-L05-S01 — 엔진: module-choice-cards (재사용, embeds/_engine/module-choice-cards.{js,css}) · _autoheight.
     체험: 요구사항 카드를 CH11 지금/CH17/CH21/CH27/CH28로 분류 → 정답·이유. "지금 범위"를 명확히. 데이터=window.MCC_CFG. -->
<html lang="ko" data-eng="module-choice-cards">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SALV 1차 범위 카드 · CH11-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/module-choice-cards.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">이 요구사항은 지금인가, 나중인가? <small>(SALV 1차 범위)</small></p>
  <p class="lead">SALV를 처음 성공하면 더 많은 게 하고 싶어집니다. <b>지금 할 수 있는 것</b>과 <b>뒤에서 배울 것</b>을 구분해 보세요 — 이건 제한이 아니라 지금 단계의 성공을 확실히 하기 위한 지도입니다.</p>

  <div class="scorebar">
    <span class="score" id="score">정답 0 / 6</span>
    <button class="reset" id="reset" type="button">다시</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="note"><b>지금 범위</b> — <code>factory</code>·<code>set_all</code>·<code>display</code> 중심의 <b>읽기 전용</b> 표 출력과 기본 정렬·필터·합계. 컬럼/색 세부 제어는 CH21, 컨테이너 Grid ALV는 CH17, 이벤트는 CH27, 셀 편집은 CH28입니다.</div>
</div>

<script>
window.MCC_CFG = {
  choices:[
    {key:'now', label:'CH11 지금 가능'},
    {key:'c17', label:'CH17 Grid ALV'},
    {key:'c21', label:'CH21 표시 심화'},
    {key:'c27', label:'CH27 이벤트'},
    {key:'c28', label:'CH28 편집'}
  ],
  cards:[
    {q:'예매 목록을 표로 보여 주고 정렬하고 싶다.', ans:'now', why:'SALV 1차 기본 범위(표시·정렬·합계)입니다.'},
    {q:"STATUS 컬럼 제목을 '상태'로 직접 바꾸고 싶다.", ans:'c21', why:'표시 제어 심화 — CH11에선 Data Element 라벨 확인까지만.'},
    {q:'매진 행을 빨간색으로 칠하고 싶다.', ans:'c21', why:'행/셀 색상 제어는 표시 심화(CH21)입니다.'},
    {q:'ALV 행을 더블클릭하면 상세 화면으로 이동하고 싶다.', ans:'c27', why:'더블클릭·Hotspot 등 이벤트 응용은 CH27입니다.'},
    {q:'좌석 수를 셀에서 바로 수정하고 저장하고 싶다.', ans:'c28', why:'셀 편집·저장 전 검증은 Editable Grid ALV(CH28)입니다.'},
    {q:'화면 중앙 영역에 ALV를 박아 넣고 싶다.', ans:'c17', why:'container 기반 Grid ALV 기초는 CH17입니다.'}
  ]
};
</script>
<script src="../_engine/module-choice-cards.js" defer></script>
</body>
</html>
