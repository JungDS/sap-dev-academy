<!DOCTYPE html>
<!-- CH25-L01-S01 — 엔진: lock-mode-matrix (embeds/_engine/lock-mode-matrix.{js,css}) · 공통토큰: _engine/_base.css
     잠금 모드(E/S/X) 호환 체험 — 보유 모드 × 요청 모드 → 허용/거절. -->
<html lang="ko" data-eng="lock-mode-matrix">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>잠금 모드 매트릭스 · CH25-L01-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/lock-mode-matrix.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">잠금 모드 호환 — 누가 같이 잠글 수 있나?</p>
  <p class="lead">User A가 <code>booking_id=1001</code>을 잠근 상태에서, User B가 같은 행을 요청합니다. 모드를 바꿔 가며 <b>허용/거절</b>을 확인하세요.</p>

  <div class="pick">
    <div class="grp"><div class="t">A가 보유한 모드</div><div class="opts">
      <button class="mode on" data-grp="held" data-m="E">E<small>쓰기</small></button>
      <button class="mode" data-grp="held" data-m="S">S<small>읽기</small></button>
      <button class="mode" data-grp="held" data-m="X">X<small>비누적</small></button>
    </div></div>
    <div class="grp"><div class="t">B가 요청한 모드</div><div class="opts">
      <button class="mode on" data-grp="req" data-m="E">E<small>쓰기</small></button>
      <button class="mode" data-grp="req" data-m="S">S<small>읽기</small></button>
    </div></div>
  </div>

  <div class="verdict ok" id="verdict"></div>

  <table id="mtx">
    <caption>호환 매트릭스 (다른 사용자 요청 기준) — 현재 조합이 강조됩니다</caption>
    <thead><tr><th>보유 ＼ 요청</th><th>E (쓰기)</th><th>S (읽기)</th></tr></thead>
    <tbody>
      <tr><th>E</th><td class="n" data-cell="EE">✕</td><td class="n" data-cell="ES">✕</td></tr>
      <tr><th>S</th><td class="n" data-cell="SE">✕</td><td class="y" data-cell="SS">✓</td></tr>
      <tr><th>X</th><td class="n" data-cell="XE">✕</td><td class="n" data-cell="XS">✕</td></tr>
    </tbody>
  </table>

  <div class="note">💡 변경 잠금은 거의 <b>E</b>(Exclusive). <b>S</b>(Shared)는 여럿이 동시에 읽을 때만 같이 걸 수 있고 쓰기(E)는 막습니다. <b>X</b>는 같은 사용자도 중첩 못 하는 강한 배타 잠금.</div>
</div>
<script src="../_engine/lock-mode-matrix.js" defer></script>
</body>
</html>
