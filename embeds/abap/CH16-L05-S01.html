<!DOCTYPE html>
<!-- CH16-L05-S01 — 엔진: input-help-priority-pov · _autoheight. 콘텐츠=레슨 전용(입력 도움 우선순위 + POV DYNP_VALUES_READ, CH16 L05).
     게이팅: classic flow logic POV·DYNP_VALUES_READ·F4IF_INT_TABLE_VALUE_REQUEST 시연만 · 저장/lock 없음. -->
<html lang="ko" data-eng="input-help-priority-pov">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>입력 도움 우선순위 + POV 후보 좁히기 · CH16-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/input-help-priority-pov.css" />
</head>
<body>
<div class="wrap" data-ihp>
  <p class="hd">입력 도움 우선순위 + POV 후보 좁히기 <small>(F4)</small></p>
  <p class="lead">먼저 <b>어떤 방법이 맞는지</b> 고르고, 정말 직접 만들어야 하면 아래 실험실에서 <code>DYNP_VALUES_READ</code>로 공연ID를 읽어 <b>그 공연의 회차만</b> F4에 띄워 봅니다.</p>

  <p class="ihp-h">① 이 칸엔 어떤 입력 도움이 맞을까?</p>
  <div class="ihp-tiers">
    <button type="button" data-tier="1" aria-pressed="false">DDIC Search Help가 있음</button>
    <button type="button" data-tier="2" aria-pressed="false">화면값에 따라 후보가 달라짐</button>
    <button type="button" data-tier="3" aria-pressed="false">그냥 직접 만들래</button>
  </div>
  <div class="ihp-tier" id="ihpTier"></div>

  <p class="ihp-h">② POV 실험실 — 회차 F4는 공연값에 따라 달라진다</p>
  <div class="ihp-lab">
    <div class="ihp-ctrl">
      <label>공연 ID</label>
      <select id="ihpConc">
        <option value="">(비움)</option>
        <option value="C001">C001</option>
        <option value="C002">C002</option>
      </select>
      <button type="button" data-act="f4">🔍 회차 칸에서 F4</button>
    </div>
    <div class="ihp-flow">
      <div id="ihpSteps"></div>
      <div class="ihp-pop" id="ihpPopup"></div>
    </div>
  </div>

  <div class="note"><b>큰 그림만 기억하세요.</b> 직접 F4는 <b>최후수단</b>이고, 그때는 <code>DYNP_VALUES_READ</code>로 다른 칸 값을 읽어 후보를 좁힙니다. POV 모듈은 후보를 보여 주고 값을 돌려줄 뿐, 저장·잠금은 하지 않습니다.</div>
</div>
<script src="../_engine/input-help-priority-pov.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
