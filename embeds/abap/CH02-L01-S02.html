<!DOCTYPE html>
<!-- CH02-L01-S02 — 엔진: var-box + _autoheight · _engine/_base.css. 변수=타입 박스+값 쪽지(#C02-1).
     선언 직후(타입 기본값) ↔ 값 넣기. 게이팅: DATA·TYPE만(string·i·p). -->
<html lang="ko" data-eng="var-box">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>변수 박스 · CH02-L01-S02</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/var-box.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">변수 = 이름표 붙은 박스, 값 = 그 안에 담는 쪽지</p>
  <p class="lead"><code>DATA</code>로 선언하면 <b>타입(라벨)</b>이 붙은 박스가 생깁니다. 선언 직후엔 타입 <b>기본값</b>(정수 <code>0</code>·문자열 <code>''</code>)이 들어 있고, <code>=</code>로 값을 넣으면 그 값이 담깁니다. 아래 버튼으로 직접 넣어 보세요.</p>
  <div data-varbox></div>
</div>
<script>
window.VB_CFG = {
  vars: [
    { name: 'gv_count', type: 'i',             value: '35',       value2: '7' },
    { name: 'gv_name',  type: 'string',        value: "'정훈영'", value2: "'손흥민'" },
    { name: 'gv_price', type: 'p DECIMALS 2',  value: "'99.90'",  value2: "'120.50'" }
  ],
  note: '박스는 한 번 만들면 <b>타입이 고정</b>됩니다. 정수 박스엔 정수만, 문자열 박스엔 문자열만 담깁니다. 비어 있어도(선언 직후) <b>타입 기본값</b>이 들어 있어요(미지정 아님). 그리고 같은 박스에 <b>다시 대입하면 이전 쪽지는 버려집니다</b>. 변수는 <b>마지막 값만</b> 기억해요.'
};
</script>
<script src="../_engine/var-box.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
