<div class="wrap">
  <p class="hd">문자열 함수 — 빈칸 채우기 <small>(잇기·쪼개기·길이·찾기)</small></p>
  <p class="lead"><code>CONCATENATE·SPLIT·strlen·FIND</code>의 핵심 키워드를 직접 채워 완성해 보세요.</p>

  <div class="fillblank" data-fillblank
       data-explain="문자열 함수 — 잇기(CONCATENATE … INTO)·쪼개기(SPLIT … AT)·길이(strlen( ))·찾기(FIND … IN)."
       data-hint="CONCATENATE … INTO · SPLIT … AT · strlen( ) · FIND … IN">
    <div class="fb-hd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div>
<pre><span class="cmt">" 잇기</span>
CONCATENATE '정훈영' '님' <input class="blank" data-answer="INTO" placeholder="____" aria-label="빈칸1"> gv_full.

<span class="cmt">" 쪼개기</span>
SPLIT gv_id <input class="blank" data-answer="AT" placeholder="__" aria-label="빈칸2"> ':' INTO gv_cty gv_name.

<span class="cmt">" 길이</span>
gv_len = <input class="blank" data-answer="strlen" placeholder="______" aria-label="빈칸3">( gv_name ).

<span class="cmt">" 찾기</span>
<input class="blank" data-answer="FIND" placeholder="____" aria-label="빈칸4"> 'ABAP' IN gv_text.</pre>

      <button class="btn" data-check type="button">채점하기</button>
