<!DOCTYPE html>
<!-- CH18-L08-S01 — 엔진: reduce-filter-lab · _autoheight. 콘텐츠=레슨 전용(REDUCE·FILTER, CH18 L08).
     게이팅: modern 테이블 표현식 시연만 · DML/저장 없음. -->
<html lang="ko" data-eng="reduce-filter-lab">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>집계·필터 실험실 · CH18-L08-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/reduce-filter-lab.css" />
</head>
<body>
<div class="wrap" data-rfl>
  <p class="hd">집계·필터 실험실 <small>(REDUCE · FILTER)</small></p>
  <p class="lead"><code>REDUCE</code>는 여러 행을 <b>하나(합계)</b>로 줄이고, <code>FILTER</code>는 <b>조건에 맞는 행만</b> 새 테이블로 만듭니다. 버튼을 눌러 누적 과정과 필터 결과를 확인하세요.</p>

  <p class="rfl-sub">원본 예매 테이블 (lt_booking)</p>
  <div id="rflSrc"></div>

  <div class="rfl-btns">
    <button type="button" data-op="reduce">REDUCE 좌석 합계</button>
    <button type="button" data-op="filter">FILTER status=N</button>
    <button type="button" data-op="except">FILTER EXCEPT</button>
  </div>
  <div class="rfl-out" id="rflOut"></div>

  <div class="note"><b>단순 패턴에 쓴다.</b> <code>REDUCE</code> 합계는 <code>LOOP</code>와 같은 결과지만 준비 코드가 적습니다. 누적 중간에 검증·메시지가 많아지면 오히려 <code>LOOP</code>가 읽기 좋습니다.</div>
</div>
<script src="../_engine/reduce-filter-lab.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
