<!DOCTYPE html>
<!-- CH14-L05-S01 — 엔진: sm30-gate-checklist · _autoheight. 콘텐츠=레슨 전용(SM30 열리기까지 조건, CH14 L05).
     config=window.SGC_CFG. 게이팅: classic TMG·SM30·Display/Maintenance·권한 개념만 · CDS/modern 없음. -->
<html lang="ko" data-eng="sm30-gate-checklist">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SM30이 열리기까지 — 게이트 체크리스트 · CH14-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/sm30-gate-checklist.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">SM30이 열리기까지 <small>(게이트 체크리스트)</small></p>
  <p class="lead"><code>SM30</code>은 "마법 주소"가 아닙니다. 아래 조건이 <b>모두</b> 맞아야 유지보수 화면이 열립니다. 게이트를 켜며 <b>▶ SM30 실행</b>으로 무엇이 막는지 확인하세요.</p>

  <div class="sgc-pipe"></div>

  <p class="sgc-h">조건 게이트</p>
  <div class="sgc-gates" id="sgcGates"></div>

  <div class="sgc-run"><button class="sgc-runbtn" type="button" data-run>▶ SM30 실행</button></div>
  <div class="sgc-status" id="sgcStatus"></div>

  <div class="sgc-grid hide" id="sgcGrid">
    <div class="sgc-grid__hd">SM30 — ZHALL 유지보수</div>
    <table class="sgc-tbl"></table>
  </div>

  <div class="note"><b>생성 성공 ≠ 유지보수 가능.</b> 테이블 활성화·Display/Maintenance 허용·TMG 생성·권한이 모두 맞아야 SM30이 열립니다. 객체 설정이 맞아도 사용자 권한이 부족하면 못 엽니다 — 표준 유지보수는 설정과 권한이 함께 필요합니다.</div>
</div>

<script>
window.SGC_CFG = {
  gates: [
    { key: 'active', label: '테이블 활성화', short: 'Active', sub: 'SE11 활성' },
    { key: 'maint', label: 'Display/Maintenance 허용', short: 'Maint 허용', sub: 'DDIC 설정' },
    { key: 'tmg', label: 'TMG 생성 (maintenance dialog)', short: 'TMG', sub: 'SE54/Utilities' },
    { key: 'auth', label: '권한 OK (Authorization)', short: '권한', sub: 'Auth Group' }
  ],
  gridCols: [
    { key: 'hall_id', label: 'hall_id' },
    { key: 'hall_name', label: 'hall_name' },
    { key: 'capacity', label: 'capacity' }
  ],
  gridRows: [
    { hall_id: 'H01', hall_name: '블루홀', capacity: 300 },
    { hall_id: 'H02', hall_name: '그린홀', capacity: 180 }
  ]
};
</script>
<script src="../_engine/sm30-gate-checklist.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
