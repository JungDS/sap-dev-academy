<!DOCTYPE html>
<!-- CH19-L07-S01 — 엔진: module-choice-cards (재사용, embeds/_engine/module-choice-cards.{js,css}) · _autoheight.
     체험: SQL Decision Cards — 상황을 @host/@DATA/CASE/COALESCE/SELECT FROM @itab/ABAP·명시타입 중 하나로 분류 → 정답·이유. 데이터=window.MCC_CFG.
     게이팅: CH19 모던 SQL 도구 선택 판단만 · 새 문법 도입 없음 · CDS/OO는 예고만(퀴즈 제외). -->
<html lang="ko" data-eng="module-choice-cards">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQL Decision Cards · CH19-L07-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/module-choice-cards.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">SQL Decision Cards <small>(상황에 맞는 도구는?)</small></p>
  <p class="lead">"modern이니까 무조건 SQL"이 아닙니다. <b>DB가 잘하는 집합 연산·결과 컬럼 계산은 SQL에</b>, <b>절차적 판단은 ABAP에</b>. 각 상황을 가장 알맞은 도구로 분류해 보세요.</p>

  <div class="scorebar">
    <span class="score" id="score">정답 0 / 6</span>
    <button class="reset" id="reset" type="button">다시</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="note"><b>고르는 기준.</b> ABAP 값 경계 → <code>@</code> · 짧은 결과 → <code>@DATA( )</code> · 상태 컬럼 → <code>CASE</code> · null 대체 → <code>COALESCE</code> · 메모리 데이터 재가공 → <code>SELECT FROM @itab</code> · 후속 key 조회·복잡 규칙 → 명시 타입 / ABAP.</div>
</div>

<script>
window.MCC_CFG = {
  choices: [
    { key: 'host', label: '@ host변수' },
    { key: 'data', label: '@DATA( )' },
    { key: 'case', label: 'SQL CASE' },
    { key: 'coal', label: 'COALESCE' },
    { key: 'itab', label: 'SELECT FROM @itab' },
    { key: 'abap', label: 'ABAP / 명시타입' }
  ],
  cards: [
    { q: '사용자가 입력한 p_carrid와 같은 행만 읽는다.', ans: 'host', why: 'ABAP 값임을 SQL 안에서 표시 — WHERE carrid = @p_carrid.' },
    { q: '짧은 조회 결과를 바로 출력하고 끝낸다.', ans: 'data', why: '결과 target을 SELECT 가까이 두는 @DATA( ) — standard table·empty key.' },
    { q: '좌석이 꽉 찼으면 FULL, 아니면 OPEN 컬럼을 결과에 추가한다.', ans: 'case', why: 'DB에서 조건별 결과 컬럼을 만드는 건 CASE … END AS seat_status.' },
    { q: 'outer join에서 매칭이 없을 때 빈칸 대신 "N/A"를 보여 준다.', ans: 'coal', why: 'DB null을 대체값으로 바꾸는 건 COALESCE(첫 non-null).' },
    { q: '이미 메모리에 가져온 내부 테이블을 항공사별로 집계한다.', ans: 'itab', why: '메모리 데이터에 SQL 문법을 적용하는 SELECT FROM @itab. 단 DB 대량 대체재는 아닙니다.' },
    { q: '조회 결과를 key로 여러 번 찾아 읽거나, 복잡한 업무 규칙을 표현한다.', ans: 'abap', why: '@DATA( )는 empty key라 key 후속 조회가 잦으면 명시 타입이, 복잡 규칙은 ABAP 코드가 낫습니다.' }
  ]
};
</script>
<script src="../_engine/module-choice-cards.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
