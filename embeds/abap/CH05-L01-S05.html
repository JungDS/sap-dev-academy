<!DOCTYPE html>

     LIKE는 기존 변수를 보고 동일 구조 생성 → gs_p1과 같은 컴포넌트·타입·길이. 설정=window.SV_CFG. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>gs_p4 LIKE gs_p1 트리 · CH05-L01-S05</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/struct-viz.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">LIKE로 선언한 <code>gs_p4</code> <small>(선언 직후 → 값 전달)</small></p>
  <p class="lead"><code>DATA gs_p4 LIKE gs_p1.</code> — <code>gs_p1</code>과 <b>똑같은 모양</b>이지만 선언 직후엔 전부 <b>초기값</b>(점선). 아래 <b>▶ 값 전달 실행</b>으로 <code>name</code>에 <code>'강호동'</code>이 기록되는 과정을 보세요.</p>
  <div data-structviz></div>
</div>
<script>
window.SV_CFG = {
  root: 'gs_p4',
  comps: [
    { name: 'name',   type: 'string' },
    { name: 'age',    type: 'i' },
    { name: 'amount', type: 'p LENGTH 8 DECIMALS 2' }
  ],
  assign: { comp: 'name', value: "'강호동'", stmt: "gs_p4-name = '강호동'." },
  note: '<code>LIKE gs_p1</code> = <code>gs_p1</code>과 <b>모양만</b> 같게(이름·타입·길이) — 값은 복사되지 않고 선언 직후엔 모두 초기값(정수 0·문자열 \'\'·p 0.00). 버튼을 누르면 <code>name</code>에만 값이 기록되고, <b>age·amount는 여전히 초기값</b>입니다. <b>TYPE이든 LIKE이든 선언하면 변수는 반드시 초기값을 가집니다.</b>'
};
</script>
