<!DOCTYPE html>
<!-- CH26-L01-S01 — 엔진: factory-sim (embeds/_engine/factory-sim.{js,css}) · 공통토큰: _engine/_base.css
     Factory 패턴 체험 — type 선택 → 팩토리가 만든 구체 클래스, 호출부 불변. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Factory 시뮬 · CH26-L01-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/factory-sim.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">Factory — 어느 클래스를 만들지 팩토리가 정한다</p>
  <p class="lead">타입을 바꿔 보세요. <b>호출부 코드는 그대로</b>인데, 팩토리가 타입에 맞는 <b>구체 클래스</b>를 만들어 줍니다.</p>

  <div class="pick">
    <span class="t">type:</span>
    <button class="ty on" data-t="V" type="button">'V'<small>VIP</small></button>
    <button class="ty" data-t="G" type="button">'G'<small>일반</small></button>
    <button class="ty" data-t="Z" type="button">'Z'<small>알 수 없음</small></button>
  </div>

  <div class="flow">
    <div class="box const"><div class="bt">호출부(client) <span class="tag">안 바뀜</span></div><div class="code" id="client"></div></div>
    <div class="arrow">→</div>
    <div class="product" id="product"></div>
  </div>

  <div class="note">💡 호출부는 <code>zcl_booking_factory=>create( type )</code> 한 줄뿐 — 어떤 클래스가 나오는지 몰라도 됩니다. 새 예매 종류가 생기면 <b>팩토리만</b> 고치고 호출부는 그대로(인터페이스 <code>zif_booking</code> 반환 → 다형성).</div>
</div>
<script src="../_engine/factory-sim.js" defer></script>
</body>
</html>
