<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>잠금 해제 판별 퀴즈 · CH25-L03-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/judge-quiz.css" />

<body>
<div class="wrap">
  <p class="hd">잠금은 언제 풀릴까? — 풀림 / 유지 판별</p>
  <p class="lead">각 상황에서 내가 <code>1001</code>에 건 잠금이 <b>풀리는지</b> <b>유지되는지</b> 고르세요. 즉시 정답·해설이 나옵니다.</p>

  <div class="score"><span>점수</span><div class="bar"><i id="sbar"></i></div><span class="v" id="sv">0 / 0</span></div>
  <div id="list"></div>
  <div class="result" id="result"></div>

  <script type="application/json" id="quiz">
  {
    "labels": ["🔓 풀림", "🔒 유지"],
    "items": [
      { "q": "<code>DEQUEUE_EZ_BOOKING</code>을 호출했다.", "a": 0, "why": "명시적 <b>DEQUEUE</b> 호출 → 그 잠금이 풀린다." },
      { "q": "<code>COMMIT WORK</code>를 실행했다.", "a": 0, "why": "트랜잭션이 끝나며 잠금이 <b>자동 해제</b>된다(가장 흔한 해제 경로)." },
      { "q": "<code>ROLLBACK WORK</code>를 실행했다.", "a": 0, "why": "ROLLBACK도 트랜잭션을 끝내므로 잠금이 <b>자동 해제</b>된다." },
      { "q": "사용자가 SAP 세션(모드)을 종료했다.", "a": 0, "why": "<b>세션 종료</b> 시 그 세션이 보유한 잠금은 모두 풀린다." },
      { "q": "그 예매 행을 <code>SELECT</code>로 조회만 했다.", "a": 1, "why": "단순 읽기는 잠금과 무관 → 잠금은 <b>그대로 유지</b>." },
      { "q": "다른 예매(<code>2002</code>)를 변경했다.", "a": 1, "why": "다른 키의 작업 → <code>1001</code> 잠금은 <b>유지</b>(키 단위 잠금)." },
      { "q": "<code>DEQUEUE_ALL</code>을 호출했다.", "a": 0, "why": "현재 프로그램이 건 <b>모든 잠금</b>을 한 번에 푼다 → 1001도 풀림." }
    ]
  }
  </script>
</div>
<script src="../_engine/judge-quiz.js" defer></script>
