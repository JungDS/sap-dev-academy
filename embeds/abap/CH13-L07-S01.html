<!DOCTYPE html>
<!-- CH13-L07-S01 — 엔진: module-choice-cards (재사용, embeds/_engine/module-choice-cards.{js,css}) · _autoheight.
     체험: 조회 전략 의사결정 카드 — 상황을 JOIN/FAE/ABAP/GROUP BY/LEFT OUTER 중 하나로 분류 → 정답·이유. 데이터=window.MCC_CFG.
     게이팅: CH13 classic 도구 선택 판단만 · 새 문법 도입 없음. -->
<html lang="ko" data-eng="module-choice-cards">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조회 전략 의사결정 카드 · CH13-L07-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/module-choice-cards.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">조회 전략 의사결정 카드 <small>(무엇으로 합칠까?)</small></p>
  <p class="lead">상황마다 <b>데이터가 어디 있고, 질문이 무엇인지</b> 먼저 묻습니다. 각 카드를 가장 알맞은 도구로 분류해 보세요 — 성능보다 "정확한 결과"가 먼저입니다.</p>

  <div class="scorebar">
    <span class="score" id="score">정답 0 / 5</span>
    <button class="reset" id="reset" type="button">다시</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="note"><b>고르는 기준.</b> DB 테이블끼리 키 관계가 명확 → JOIN · 이미 내부 테이블 기준 목록 → FAE(빈 목록 보호 필수) · 이미 읽은 소량 가공 → ABAP · 그룹 요약 → GROUP BY · 기준 행 보존 → LEFT OUTER JOIN.</div>
</div>

<script>
window.MCC_CFG = {
  choices: [
    { key: 'join', label: 'JOIN' },
    { key: 'fae', label: 'FOR ALL ENTRIES' },
    { key: 'abap', label: 'ABAP 처리' },
    { key: 'group', label: 'GROUP BY' },
    { key: 'left', label: 'LEFT OUTER JOIN' }
  ],
  cards: [
    { q: '공연과 예매를 함께 보여야 한다 — 둘 다 DB 테이블이고 공연ID로 연결된다.', ans: 'join', why: '두 DB 테이블의 키 관계가 명확하니 DB에서 한 번에 합치는 JOIN이 자연스럽습니다.' },
    { q: '사용자가 선택한 부서 목록이 이미 내부 테이블에 있고, 그 부서 사람만 조회한다.', ans: 'fae', why: '이미 내부 테이블 기준 목록이 있으니 FAE. 단 빈 목록 보호(IS NOT INITIAL)가 필수입니다.' },
    { q: '이미 읽어 둔 30건 결과를 화면에 뿌리기 전에 이름순으로만 바꾸고 싶다.', ans: 'abap', why: '이미 메모리에 있는 소량 데이터의 단순 정렬은 ABAP SORT가 더 단순합니다.' },
    { q: '공연별로 예약된 좌석 합계를 구해야 한다.', ans: 'group', why: '여러 행을 한 줄 요약으로 줄이는 그룹 집계는 GROUP BY + SUM입니다.' },
    { q: '예매가 한 건도 없는 공연도 현황표에 0건으로 보여야 한다.', ans: 'left', why: '기준 공연을 모두 보존해야 하니 LEFT OUTER JOIN(예매 없으면 오른쪽 초기값).' }
  ]
};
</script>
<script src="../_engine/module-choice-cards.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
