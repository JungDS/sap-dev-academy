<!DOCTYPE html>
<!-- CH16-L01-S01 — 엔진: process-flow-pbo-pai · 자체 postHeight. 콘텐츠=레슨 전용(Module Pool 두 박자, #C16-1).
     게이팅: Module Pool/Dynpro 개념만(SELECT/ALV 파이프라인 없음). -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBO/PAI 두 박자 흐름 · CH16-L01-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/process-flow-pbo-pai.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">화면의 두 박자 — PBO / PAI <small>(Module Pool)</small></p>
  <p class="lead">Module Pool 화면은 <b>PBO</b>(그리기 직전) → 화면 표시 → 사용자 입력 → <b>PAI</b>(입력 처리)의 <b>두 박자</b>로 돕니다. <code>ABAP 코드</code>가 도는 곳은 <b>PBO·PAI</b> 두 지점이고, 가운데는 사용자·화면 차례입니다.</p>

  <div class="pf-ctrl">
    <button class="pf-btn" id="pfNext" type="button">▶ 다음 박자</button>
    <button class="pf-reset" id="pfReset" type="button">↺ 처음부터</button>
    <span class="pf-loops" id="pfLoops">완료한 사이클: 0</span>
  </div>

  <div data-pbopai></div>

  <div class="note"><b>리포트와 다르다</b> — 실행형 리포트는 <code>START-OF-SELECTION</code> 같은 이벤트로 흐르지만, Module Pool은 <code>PBO</code>/<code>PAI</code> 두 박자가 화면이 닫힐 때까지 반복됩니다. (Module Pool은 <b>T-code로만</b> 실행.)</div>
</div>
<script src="../_engine/process-flow-pbo-pai.js" defer></script>
</body>
</html>
