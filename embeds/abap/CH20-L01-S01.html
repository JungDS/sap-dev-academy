  <script type="application/json" id="cm-cfg">
  {
    "cols": ["무엇을 하나", "대표 질문", "행에 미치는 영향"],
    "rows": [
      { "name": "CTE (WITH)", "cells": [{"v":"중간 결과에 이름"},{"v":"합계 먼저 → 조인"},{"v":"단계로 나눔","r":"mid"}],

      { "name": "Window (OVER)", "cells": [{"v":"상세 유지 + 그룹계산"},{"v":"행마다 합계·순번"},{"v":"행 유지","r":"hi"}],
        "detail": "<code>GROUP BY</code>는 상세 행이 사라지지만, window는 <b>상세 행을 두고</b> 같은 공연의 합계·순번·순위를 옆 칸에 붙입니다. <code>OVER( PARTITION BY … )</code>로 씁니다." }
