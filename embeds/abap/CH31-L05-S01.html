<!DOCTYPE html>
<!-- CH31-L05-S01 — 엔진: odata-query · _engine/_base.css. OData $filter/$top/$skip → EntitySet 결과. -->
<html lang="ko" data-eng="odata-query">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OData 조회 · CH31-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/odata-query.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">OData 조회 — <code>$filter</code> · <code>$top</code> · <code>$skip</code></p>
  <p class="lead">쿼리 옵션을 바꿔 보세요. URL이 바뀌고, <code>GET_ENTITYSET</code>이 이를 <b>SELECT 조건·페이징</b>으로 매핑해 돌려주는 결과가 갱신됩니다.</p>
  <div class="ctrl">
    <div class="fld"><label>$filter (venue)</label><select id="venue"><option value="">(전체)</option><option>서울</option><option>부산</option><option>대구</option><option>인천</option></select></div>
    <div class="fld"><label>$top</label><input id="top" type="number" min="0" max="9" value="0" /></div>
    <div class="fld"><label>$skip</label><input id="skip" type="number" min="0" max="9" value="0" /></div>
  </div>
  <div class="url" id="url"></div>
  <div class="panel"><div class="oq-panel__h" id="cnt"></div><div id="body"></div></div>
  <div class="note">💡 <code>$filter</code>를 안 받으면 전체 반환(성능·정합 문제) → 반드시 ABAP 조건으로 매핑. 대량은 <code>$top</code>/<code>$skip</code>을 <code>SELECT … UP TO @iv_top ROWS OFFSET @iv_skip</code>에 반영(OFFSET엔 <code>ORDER BY</code> 필요). 단건은 <code>GET_ENTITY</code>.</div>
</div>
<script src="../_engine/odata-query.js" defer></script>
</body>
</html>
