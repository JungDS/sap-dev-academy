<!DOCTYPE html>
<!-- CH04-L03-S03 — §05 IS INITIAL 다이어그램(커스텀 SVG·자체 _autoheight). 중립=var() 토큰, 강조 고정 중간톤.
     게이팅: IS INITIAL(초기값 판정)만. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IS INITIAL — 초기값인지 묻기 · CH04-L03-S03</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<style>
  *{box-sizing:border-box;} html,body{margin:0;}
  body{font-family:var(--font);color:var(--ink);background:transparent;line-height:1.6;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 16px 18px;}
  .hd{margin:0 0 4px;font-weight:800;font-size:1.04rem;color:var(--ink);}
  .hd small{font-weight:600;color:var(--ink-soft);font-size:.8rem;}
  .lead{margin:0 0 14px;color:var(--ink-soft);font-size:.92rem;}
  .lead code{font-family:var(--mono);background:color-mix(in srgb,var(--brand) 12%,var(--surface));padding:1px 5px;border-radius:5px;}
  .dgm{display:block;width:100%;max-width:440px;height:auto;margin:0 auto;}
  .note{margin:12px 0 0;font-size:.84rem;color:var(--ink-soft);background:color-mix(in srgb,var(--brand) 7%,var(--surface));border:1px solid var(--line);border-radius:10px;padding:9px 12px;line-height:1.7;}
  .note b{color:var(--ink);} .note code{font-family:var(--mono);}
  .card-y{fill:color-mix(in srgb,var(--accent) 9%,var(--surface));stroke:var(--accent);stroke-width:1.9;}
  .card-n{fill:var(--surface);stroke:var(--line);stroke-width:1.6;}
  .box{fill:var(--surface);stroke:var(--ink-soft);stroke-width:1.5;}
  .tc{fill:var(--ink);font-size:13px;font-weight:800;font-family:var(--mono);}
  .t{fill:var(--ink);font-size:12.5px;font-weight:700;font-family:var(--font);}
  .sm{fill:var(--ink-soft);font-size:11.5px;font-weight:700;font-family:var(--font);}
  .res-y{fill:var(--accent);font-size:13px;font-weight:800;font-family:var(--font);}
  .res-n{fill:var(--ink-soft);font-size:13px;font-weight:800;font-family:var(--font);}
  .arr{stroke:var(--ink-soft);stroke-width:1.7;fill:none;}
  .ah{fill:var(--ink-soft);}
</style>
</head>
<body>
<div class="wrap">
  <p class="hd">IS INITIAL — 변수가 '초기값'인지 묻는다 <small>(빈 값 확인)</small></p>
  <p class="lead"><code>p_amt IS INITIAL</code>은 "값이 아직 <b>비어 있나?</b>"를 묻습니다 — 초기값이면 참, 아니면 거짓.</p>

  <svg class="dgm" viewBox="0 0 440 196" xmlns="http://www.w3.org/2000/svg" role="img"
       aria-label="p_amt가 0이면 IS INITIAL 참, 500이면 거짓">
    <defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ah"/></marker></defs>

    <!-- 왼쪽: 비었음 → 참 -->
    <rect class="card-y" x="20" y="14" width="190" height="158" rx="13"/>
    <rect class="box" x="60" y="34" width="110" height="34" rx="7"/>
    <text class="tc" x="115" y="56" text-anchor="middle">p_amt = 0</text>
    <text class="sm" x="115" y="88" text-anchor="middle">→ 비어 있음 (초기값)</text>
    <path class="arr" d="M115,96 L115,116" marker-end="url(#ah)"/>
    <text class="res-y" x="115" y="140" text-anchor="middle">IS INITIAL → 참</text>
    <text class="sm" x="115" y="160" text-anchor="middle">'입력값이 없습니다'</text>

    <!-- 오른쪽: 값 있음 → 거짓 -->
    <rect class="card-n" x="230" y="14" width="190" height="158" rx="13"/>
    <rect class="box" x="270" y="34" width="110" height="34" rx="7"/>
    <text class="tc" x="325" y="56" text-anchor="middle">p_amt = 500</text>
    <text class="sm" x="325" y="88" text-anchor="middle">→ 값이 있음</text>
    <path class="arr" d="M325,96 L325,116" marker-end="url(#ah)"/>
    <text class="res-n" x="325" y="140" text-anchor="middle">IS INITIAL → 거짓</text>
    <text class="sm" x="325" y="160" text-anchor="middle">(IF 블록 건너뜀)</text>
  </svg>

  <p class="note"><b>초기값</b>은 타입마다 다른 '빈 값' — 숫자 <code>0</code> · 문자 공백 · 날짜 <code>00000000</code>. <code>IS INITIAL</code>은 이 빈 값을 타입에 맞게 한 번에 확인해 줘서 <code>p_amt = 0</code>보다 깔끔합니다.</p>
</div>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
