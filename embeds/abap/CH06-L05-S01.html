  {
    "labels": ["🧱 Flat", "🕳 Deep"],
    "items": [
      { "q": "구구단 한 줄 — <code>dan TYPE i · mul TYPE i · result TYPE i</code>", "a": 0, "why": "전부 고정 길이 숫자(<code>i</code>) → 가변 요소 없음 = <b>Flat</b>." },

      { "q": "회원 카드 — <code>name TYPE c LENGTH 20 · birth TYPE d · height TYPE p LENGTH 3 DECIMALS 1</code>", "a": 0, "why": "<code>c LENGTH n</code>·<code>d</code>·<code>p</code> 모두 고정 길이 → <b>Flat</b>. DB 테이블 행으로도 적합한 모양." }
