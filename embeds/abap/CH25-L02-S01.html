<!DOCTYPE html>
<!-- CH25-L02-S01 — 엔진: txn-atomicity (embeds/_engine/txn-atomicity.{js,css}) · 공통토큰: _engine/_base.css
     COMMIT/ROLLBACK 원자성 체험 — 미확정(메모리) ↔ 확정(DB), 항목 실패 토글로 반쪽 저장 위험. -->
<html lang="ko" data-eng="txn-atomicity">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>원자성 시뮬레이터 · CH25-L02-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/txn-atomicity.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">트랜잭션 원자성 — <b>전부 아니면 전무</b></p>
  <p class="lead">예매 = <code>ZBOOKING</code>(헤더) + <code>ZBOOKING_ITEM</code>(좌석) 한 묶음. 항목 INSERT를 일부러 실패시키고 <b>COMMIT</b>해 보면 "반쪽 저장"이 무엇인지 보입니다.</p>

  <div class="bar">
    <label class="alert-toggle"><input type="checkbox" id="failItem" /> 항목 INSERT 실패 시뮬</label>
    <button class="btn go" id="process" type="button">① 예매 처리 (INSERT 2건)</button>
    <button class="btn commit" id="commit" type="button" disabled>② COMMIT WORK</button>
    <button class="btn rollback" id="rollback" type="button" disabled>③ ROLLBACK WORK</button>
    <button class="reset" id="reset" type="button">↺ 초기화</button>
  </div>

  <div class="cols">
    <div class="col mem"><div class="col__h">🧠 메모리 — 미확정 변경</div><div class="col__b" id="mem"></div></div>
    <div class="col db"><div class="col__h">💾 DB — 확정됨</div><div class="col__b" id="db"></div></div>
  </div>

  <div class="msg info" id="msg"></div>
  <div class="note">💡 핵심: 실패를 확인하면 반드시 <code>ROLLBACK</code>해 반쪽 저장을 막습니다. 문장이 여러 개면 마지막 <code>sy-subrc</code>만 보지 말고 실패를 누적(<code>lv_failed</code>)해 <b>업무 단위 전체가 성공</b>했을 때만 <code>COMMIT</code>하세요.</div>
</div>
<script src="../_engine/txn-atomicity.js" defer></script>
</body>
</html>
