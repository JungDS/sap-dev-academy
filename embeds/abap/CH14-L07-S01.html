<!DOCTYPE html>
<!-- CH14-L07-S01 — 엔진: se16n-tracker · _autoheight. 콘텐츠=레슨 전용(SM30 저장→SE16N 확인, CH14 L07).
     config=window.SE16_CFG. 게이팅: classic SE16N(Data Browser)·원본 vs View 개념만 · CDS/modern/운영편집 없음. -->
<html lang="ko" data-eng="se16n-tracker">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>저장 후 추적기 — SE16N · CH14-L07-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/se16n-tracker.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">저장 후 추적기 <small>(SM30 저장 → SE16N 확인)</small></p>
  <p class="lead"><code>SM30</code>으로 <code>H03</code>을 저장한 뒤 <code>SE16N</code>으로 확인합니다. 대상(원본 테이블 / View)과 조건을 바꿔, 저장 결과와 <b>원본 vs View 차이</b>를 직접 보세요.</p>

  <div class="se16-save">
    <button class="se16-savebtn" type="button" data-save>▶ SM30에서 H03 저장</button>
    <span class="se16-saved"></span>
  </div>

  <div class="se16-controls">
    <div class="se16-grp"><span class="clbl">SE16N Table</span><div class="se16-seg se16-tbl-seg"></div></div>
    <div class="se16-grp"><span class="clbl">조건</span><div class="se16-seg se16-cond-seg"></div></div>
  </div>

  <p class="se16-h">조회 결과</p>
  <table class="se16-tbl"><thead><tr id="se16Head"></tr></thead><tbody id="se16Body"></tbody></table>

  <div class="se16-status" id="se16Status"></div>

  <div class="note"><b>SE16N은 확인용.</b> 빠른 조회·점검 도구일 뿐, 정식 입력 화면은 SM30·전용 프로그램입니다. 0건이라고 바로 "저장 실패"로 단정하지 말고 조건·클라이언트·권한을 보세요. 원본 테이블과 View는 같은 질문이 아닙니다(View는 결합 조건에 따라 행이 달라짐).</div>
</div>

<script>
window.SE16_CFG = {
  cols: {
    ZHALL: [{ key: 'hall_id', label: 'hall_id' }, { key: 'hall_name', label: 'hall_name' }, { key: 'capacity', label: 'capacity' }],
    ZV_CONCERT: [{ key: 'concert_id', label: 'concert_id' }, { key: 'hall_id', label: 'hall_id' }, { key: 'hall_name', label: 'hall_name' }]
  },
  zhall: [
    { hall_id: 'H01', hall_name: '블루홀', capacity: 300 },
    { hall_id: 'H02', hall_name: '그린홀', capacity: 180 }
  ],
  newRow: { hall_id: 'H03', hall_name: '레드홀', capacity: 250 },
  zvconcert: [
    { concert_id: 'C001', hall_id: 'H01', hall_name: '블루홀' },
    { concert_id: 'C002', hall_id: 'H02', hall_name: '그린홀' }
  ]
};
</script>
<script src="../_engine/se16n-tracker.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
