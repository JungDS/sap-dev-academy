<!DOCTYPE html>
<!-- CH05-L01-S01 — 엔진: step-debugger (embeds/_engine/step-debugger.{js,css}) + _autoheight.js
     config=레슨 전용(Local Structure gs_person 채우기, #C05-1). 게이팅: 내부테이블·inline DATA() 없음(classic). -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>구조체 스텝 디버거 · CH05-L01-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/step-debugger.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">Structure — 필드가 한 묶음으로 채워진다 <small>(스텝 디버거)</small></p>
  <p class="lead"><b>다음 ⏭</b>을 누를 때마다 한 줄씩 실행됩니다. <code>gs_person</code> <b>한 변수</b> 안에 <code>name·age·amount</code> 세 칸이 함께 들어 있고, 한 줄씩 채워지는 모습을 보세요.</p>

  <div class="dbg" data-stepper>
    <div class="dbg__bar">
      <button class="btn btn--primary" data-start>▶ 시작</button>
      <button class="btn btn--step" data-next disabled>다음 ⏭</button>
      <div class="progress"><i data-progress></i></div>
      <span class="muted" data-counter>0 / 3</span>
    </div>
    <div class="dbg__main">
      <div class="dbg__editorwrap"><div class="dbg__edhd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div><div class="dbg__editor" data-code></div></div>
      <div class="dbg__watch">
        <div class="watch__head">변수 모니터 — <code>gs_person</code> 펼침</div>
        <div class="watch__list" data-vars></div>
      </div>
    </div>
    <div class="dbg__console">
      <div class="console__head">
        <span>콘솔</span>
        <span class="leg"><span class="a">▶ 실행할 차례</span> · <span class="d">✓ 방금 실행</span></span>
        <span class="sp"></span>
        <span class="cmode"><button class="cmode__b on" data-cmode="cur">현재 행</button><button class="cmode__b" data-cmode="all">전체 출력</button></span>
      </div>
      <pre class="console__body" data-console>대기 중 — ▶ 시작을 누르세요.</pre>
    </div>
    <script type="application/json" class="stepper-config">
    {
      "code":[
        "TYPES: BEGIN OF ty_person,",
        "         name   TYPE string,",
        "         age    TYPE i,",
        "         amount TYPE p LENGTH 8 DECIMALS 2,",
        "       END OF ty_person.",
        "",
        "DATA gs_person TYPE ty_person.",
        "",
        "gs_person-name   = '정훈영'.",
        "gs_person-age    = 30.",
        "gs_person-amount = '1500.50'."
      ],
      "vars":[
        {"label":"gs_person-name","sub":"name · string","key":"gs_person-name","init":"( 공백 )"},
        {"label":"gs_person-age","sub":"age · i","key":"gs_person-age","init":"0"},
        {"label":"gs_person-amount","sub":"amount · p DEC 2","key":"gs_person-amount","init":"0.00"}
      ],
      "steps":[
        {"line":9,"vars":{"gs_person-name":"정훈영"},"console":"gs_person-name = '정훈영'"},
        {"line":10,"vars":{"gs_person-age":"30"},"console":"gs_person-age = 30"},
        {"line":11,"vars":{"gs_person-amount":"1500.50"},"console":"gs_person-amount = 1500.50 — 한 변수에 세 칸이 모두 채워짐"}
      ]
    }
    </script>
  </div>
</div>
<script src="../_engine/step-debugger.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
