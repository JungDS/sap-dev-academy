<!DOCTYPE html>
<!-- CH06-L03-S02 — 엔진: step-debugger (embeds/_engine/step-debugger.{js,css}) + _autoheight.js
     config=레슨 전용(BINARY SEARCH 함정: 정렬 없이 → 실패, SORT 후 → 성공).
     게이팅: CH06-L03 범위(SORT·READ BINARY SEARCH). -->
<html lang="ko" data-eng="step-debugger">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BINARY SEARCH 함정 · CH06-L03-S02</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/step-debugger.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">정렬 없이 BINARY SEARCH — 있는 행도 못 찾는다 <small>(함정 재현)</small></p>
  <p class="lead">테이블에 유재석이 <b>분명히 있는데</b>, 정렬 없이 <code>BINARY SEARCH</code>를 붙이면 "없음"이 나옵니다. 왜 그런지 직접 실행해 보세요.</p>

  <div class="dbg" data-stepper>
    <div class="dbg__bar">
      <button class="btn btn--primary" data-start>▶ 시작</button>
      <button class="btn btn--step" data-next disabled>다음 ⏭</button>
      <div class="progress"><i data-progress></i></div>
      <span class="muted" data-counter>0 / 3</span>
    </div>
    <div class="dbg__main">
      <div class="dbg__editorwrap"><div class="dbg__edhd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div><div class="dbg__editor" data-code></div></div>
      <div class="dbg__watch">
        <div class="watch__head">변수 모니터</div>
        <div class="watch__list" data-vars></div>
      </div>
    </div>
    <div class="dbg__console">
      <div class="console__head">
        <span>콘솔</span>
        <span class="leg"><span class="a">▶ 실행할 차례</span> · <span class="d">✓ 방금 실행</span></span>
        <span class="sp"></span>
        <span class="cmode"><button class="cmode__b on" data-cmode="cur">현재 행</button><button class="cmode__b" data-cmode="all">전체 출력</button></span>
      </div>
      <pre class="console__body" data-console>대기 중 — ▶ 시작을 누르세요.</pre>
    </div>
    <script type="application/json" class="stepper-config">
    {
      "code":[
        "\" gt_person = 정훈영/30 · 홍길동/25 · 유재석/40 (정렬 안 됨)",
        "READ TABLE gt_person INTO gs_person",
        "     WITH KEY name = '유재석' BINARY SEARCH.",
        "",
        "SORT gt_person BY name.",
        "",
        "READ TABLE gt_person INTO gs_person",
        "     WITH KEY name = '유재석' BINARY SEARCH."
      ],
      "vars":[
        {"label":"gs_person-name","sub":"Work Area · name","key":"gs_person-name","init":"( 공백 )"},
        {"label":"gs_person-age","sub":"Work Area · age","key":"gs_person-age","init":"0"},
        {"label":"gt_person","sub":"Internal Table · 명단","key":"gt_person","itab":{"cols":["name","age"],"num":[false,true]},"init":[["정훈영",30],["홍길동",25],["유재석",40]]},
        {"label":"sy-subrc","sub":"성공 0 / 실패 4","key":"sy-subrc","init":"-"}
      ],
      "steps":[
        {"line":2,"vars":{"sy-subrc":"4"},"console":"sy-subrc = 4 — 유재석이 3번 행에 있는데도 '없음'! 이진 탐색은 '정렬돼 있다'고 믿고 절반씩 버리는데, 정렬이 안 돼 있어 유재석이 있는 절반을 버렸습니다"},
        {"line":5,"vars":{"gt_person":[["유재석",40],["정훈영",30],["홍길동",25]]},"console":"SORT BY name — 검색에 쓸 키(name) 기준 오름차순 정렬. 이제 이진 탐색의 전제가 갖춰졌습니다"},
        {"line":7,"vars":{"gs_person-name":"유재석","gs_person-age":"40","sy-subrc":"0"},"focus":{"gt_person":1},"console":"이번엔 즉시 발견 — sy-subrc = 0. BINARY SEARCH는 '같은 키로 먼저 SORT'가 세트입니다"}
      ]
    }
    </script>
  </div>
  <div class="note">💡 정렬 없는 <code>BINARY SEARCH</code>는 오류 메시지도 없이 <b>조용히 잘못된 "없음"</b>을 돌려줍니다. 찾기가 자주 틀린다면 정렬부터 의심하세요.</div>
</div>
<script src="../_engine/step-debugger.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
