<!DOCTYPE html>
<!-- CH33-L01-S01 — 엔진: pushdown-flow · _engine/_base.css. Data-to-Code vs Code-to-Data 전송량. -->
<html lang="ko">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Code Pushdown · CH33-L01-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/pushdown-flow.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">데이터를 끌어올까, 코드를 내려보낼까?</p>
  <p class="lead">공연별 좌석 합계를 구합니다. 어디서 집계하느냐에 따라 <b>DB→ABAP 전송량</b>이 천지차이입니다. 두 방식을 바꿔 보세요.</p>
  <div class="pd-seg">
    <button id="bUp" type="button">끌어오기 (Data-to-Code)</button>
    <button id="bDown" class="on" type="button">내려보내기 (Code-to-Data)</button>
  </div>
  <div class="diagram">
    <div class="node db"><div class="t">DB (HANA)</div><div class="nm">zbooking 100만 행</div><div class="calc" id="dbCalc"></div></div>
    <div class="pipe" id="pipe"><div class="lbl" id="pipeLbl"></div><div class="flow"><i id="pipeBar"></i></div></div>
    <div class="node abap"><div class="t">ABAP 서버</div><div class="nm">집계 결과 사용</div><div class="calc" id="abCalc"></div></div>
  </div>
  <div class="metric" id="metric"></div>
  <div class="note">💡 우선순위: <b>Open/Modern SQL</b>(1순위·이식성) → <b>CDS</b>(재사용) → <b>AMDP</b>(복잡 절차) → <b>Native SQL</b>(최후). "데이터를 ABAP으로 끌어와 LOOP" 대신 "DB에서 집계해 결과만"이 핵심.</div>
</div>
<script src="../_engine/pushdown-flow.js" defer></script>
</body>
</html>
