<!DOCTYPE html>
<!-- CH26-L05-S01 — 엔진: abap-unit-runner (embeds/_engine/abap-unit-runner.{js,css}) · 공통토큰: _engine/_base.css
     ABAP Unit 테스트 러너 — Run → ✓/✗ + assert, 버그 주입 토글로 회귀 감지. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABAP Unit 러너 · CH26-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/abap-unit-runner.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">ABAP Unit — 테스트가 회귀를 잡아낸다</p>
  <p class="lead"><b>테스트 실행</b>을 눌러 보세요. 그리고 <b>버그 주입</b>을 켜면 <code>remaining_calc</code>가 잘못된 값을 반환해 테스트가 <b>빨갛게</b> 실패합니다 — 이게 테스트의 가치.</p>

  <div class="bar">
    <button class="run" id="run" type="button">▶ 테스트 실행 (F8)</button>
    <label class="toggle"><input type="checkbox" id="bug" /> 버그 주입 (remaining 로직 오류)</label>
    <span class="summary" id="summary"></span>
  </div>

  <div class="panel">
    <div class="panel__h">ltcl_test — FOR TESTING (DB는 Mock)</div>
    <div id="list"></div>
  </div>

  <div class="note">💡 <code>cl_abap_unit_assert=>assert_equals( act exp )</code>로 기대값을 검증합니다. 의존성(DB)을 인터페이스로 분리하고 <b>Mock</b>으로 주입하면 DB 없이 로직만 빠르게 검증 → 리팩터링이 두렵지 않습니다.</div>
</div>
<script src="../_engine/abap-unit-runner.js" defer></script>
</body>
</html>
