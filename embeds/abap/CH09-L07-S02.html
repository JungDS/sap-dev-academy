<!DOCTYPE html>

     (S01 정적 사다리와 병행 — 기존 학습수단 유지.) 게이팅: 직접 F4 구현은 CH15/16 예고만. 데이터=window.FPL_CFG. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F4 우선순위 토글 실험 · CH09-L07-S02</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/f4-priority-lab.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">F4 우선순위 토글 실험 <small>(위가 있으면 아래는 안 본다)</small></p>
  <p class="lead">한 입력칸에 여러 도움말이 걸려 있어도 F4를 누르면 <b>가장 높은 하나만</b> 뜹니다. 후보를 켜고 끄며 <b>F4 누르기</b>를 눌러 무엇이 표시되는지 확인해 보세요.</p>

  <div class="ladder" id="ladder"></div>

  <div class="runrow">
    <button class="run-btn" id="run" type="button">🔍 F4 누르기 <kbd>F4</kbd></button>
  </div>

  <div class="popup" id="popup" style="display:none"></div>
  <div class="statusmsg none" id="statusmsg"></div>

  <div class="note"><b>맨 위 = 직접 F4(코드)</b>는 선택화면·Dynpro 이벤트에서 직접 만드는 도움말입니다 — 존재만 알고, 구현은 <a href="CH15-L01.html">CH15</a>/<a href="CH16-L01.html">CH16</a>에서 배웁니다. F4가 예상과 다르면 이 사다리를 위에서부터 점검하세요.</div>
</div>

<script>
window.FPL_CFG = {
  levels:[
    {key:'direct', name:'직접 F4 (코드)', desc:'선택화면·Dynpro 이벤트에서 직접 구현 (CH15/16)',

    {key:'type', name:'타입 기본 도움', desc:'날짜 달력, 시간 시계 등 타입이 제공하는 기본 도움',

  ]
};
</script>
<script src="../_engine/f4-priority-lab.js" defer></script>
