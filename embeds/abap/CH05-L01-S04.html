<!DOCTYPE html>
<!-- CH05-L01-S04 — 엔진: struct-viz(layout:'strip') + _autoheight. 콘텐츠=레슨 §타입으로 빼두기(ts_person 재사용, #C05-1).
     CS 표준 표기: 타입=값 없는 헤더 스트립(모양만·메모리 0) → 변수=같은 칼럼에 정렬된 행(한 줄 여러 칸).
     초기값은 "변수로 선언되는 순간 갖게 될 값"으로만 표기(타입은 값 없음 — 사용자 피드백 2026-07-03). 설정=window.SV_CFG. -->
<html lang="ko" data-eng="struct-viz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ts_person 타입 재사용 트리 · CH05-L01-S04</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/struct-viz.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">타입 재사용 — <code>ts_person</code> 하나로 변수 여러 개 <small>(TYPES)</small></p>
  <p class="lead">Structure의 <b>모양</b>을 <code>TYPES</code>로 한 번만 선언하고, 변수는 <code>TYPE ts_person</code>으로 여러 개 만듭니다. 모양은 공유, 값만 각자입니다.</p>
  <div data-structviz></div>
</div>
<script>
window.SV_CFG = {
  layout: 'strip',
  root: 'ts_person',
  comps: [
    { name: 'name',   type: 'string', w: 2 },     // 폭 = 대략의 길이감(SAP 표준 이미지 표기)
    { name: 'age',    type: 'i',      w: 0.8 },
    { name: 'amount', type: 'p 8,2',  w: 1.3 }
  ],
  reuse: {
    instances: [
      // 칸 = 저장된 값(맨값 표기) — 소스 리터럴('1500.50')이 아니라 메모리 값. 초기값(0.00)·S03·디버거와 표기 통일(피드백 2026-07-03)
      { root: 'gs_p1', vals: { name: '정훈영', age: '30', amount: '1500.50' } },
      { root: 'gs_p2', vals: { name: '손흥민', age: '32' } },
      { root: 'gs_p3', vals: { name: '유재석', age: '51', amount: '980.00' } }
    ]
  },
  note: '<b><code>TYPES</code>로 선언하면 모양만, <code>DATA</code>로 선언하면 모양+값입니다.</b> 그래서 <code>ts_person</code> 카드엔 값 칸이 없고(설계도), <code>gs_p1~p3</code>의 칸에는 <b>타입 라벨과 값이 함께</b> 들어 있습니다. 모양을 물려받고 값을 담았다는 뜻입니다. 안 채운 칸도 <b>선언되는 순간</b> 타입 초기값으로 시작합니다. 같은 행이 여러 개 쌓이는 이 모양은 다음 챕터(Internal Table)에서 다시 만납니다.'
};
</script>
<script src="../_engine/struct-viz.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
