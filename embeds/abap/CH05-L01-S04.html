<!DOCTYPE html>
<!-- CH05-L01-S04 — 엔진: struct-viz + _autoheight. 콘텐츠=레슨 §타입으로 빼두기(ty_person 재사용, #C05-1).
     타입(모양) 1개 → 변수 인스턴스 여러 개(값만 각자). 타입·길이(p LENGTH 8 DECIMALS 2) 표기. 설정=window.SV_CFG. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ty_person 타입 재사용 트리 · CH05-L01-S04</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/struct-viz.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">타입 재사용 — <code>ty_person</code> 하나로 변수 여러 개 <small>(TYPES)</small></p>
  <p class="lead">구조 <b>모양</b>을 <code>TYPES</code>로 한 번만 정의하고, 변수는 <code>TYPE ty_person</code>으로 여러 개 만듭니다 — 모양은 공유, 값만 각자.</p>
  <div data-structviz></div>
</div>
<script>
window.SV_CFG = {
  root: 'ty_person', kind: 'TYPE · 모양 정의',
  comps: [
    { name: 'name',   type: 'string' },
    { name: 'age',    type: 'i' },
    { name: 'amount', type: 'p LENGTH 8 DECIMALS 2' }
  ],
  reuse: {
    label: '같은 타입으로 변수 여러 개 — 모양은 한 번만 정의',
    instances: [
      { root: 'gs_p1', vals: { name: "'정훈영'", age: '30', amount: "'1500.50'" } },
      { root: 'gs_p2', vals: { name: "'손흥민'", age: '32' } },
      { root: 'gs_p3', vals: { name: "'유재석'", age: '51', amount: "'980.00'" } }
    ]
  },
  note: '모양(<code>ty_person</code>)은 한 번만 정의하고, <code>gs_p1</code>·<code>gs_p2</code>·<code>gs_p3</code>은 <code>TYPE ty_person</code>으로 같은 구조를 <b>재사용</b>합니다 — 컴포넌트·타입·길이는 같고 값만 다릅니다. 안 채운 값은 타입 초기값(점선): 정수 <code>0</code>, 금액 <code>0.00</code>.'
};
</script>
<script src="../_engine/struct-viz.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
