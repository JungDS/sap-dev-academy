<!DOCTYPE html>
<!-- CH31-L03-S01 — 엔진: idoc-status · _engine/_base.css. IDoc 상태코드 생애주기 + 오류·BD87 재처리. -->
<html lang="ko" data-eng="idoc-status">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IDoc 상태·재처리 · CH31-L03-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/idoc-status.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">IDoc 상태코드로 추적·재처리</p>
  <p class="lead">전송하고 수신 처리해 보세요. <b>오류 주입</b>을 켜면 <code>51</code>(오류)에 멈추고, <b>BD87 재처리</b>로 <code>53</code>(성공)에 도달합니다.</p>
  <div class="bar">
    <button class="btn" id="send" type="button">▶ 전송(Outbound)</button>
    <button class="btn" id="recv" type="button">▶ 수신 처리(Inbound)</button>
    <label class="alert-toggle"><input type="checkbox" id="err" /> 오류 주입</label>
    <button class="btn re" id="re" type="button" disabled>↻ BD87 재처리</button>
    <button class="reset" id="reset" type="button">↺ 초기화</button>
  </div>
  <div class="track" id="track"></div>
  <div class="note">💡 <code>WE02</code>/<code>WE05</code>로 IDoc 상태를 조회하고, 상태 <b>51</b>(데이터 오류)은 마스터/매핑을 고친 뒤 <code>BD87</code>로 재처리합니다(CH24-L04·CH30-L05와 같은 정신). 51 방치 = 업무 문서 누락 → 정기 모니터링.</div>
</div>
<script src="../_engine/idoc-status.js" defer></script>
</body>
</html>
