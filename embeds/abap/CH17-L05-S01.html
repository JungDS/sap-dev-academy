<!DOCTYPE html>
<!-- CH17-L05-S01 — 엔진: alv-layout-toggles · _autoheight. 콘텐츠=레슨 전용(LVC_S_LAYO 옵션 토글, CH17 L05).
     config=window.ALT_CFG. 게이팅: classic LVC_S_LAYO·zebra/sel_mode/grid_title/cwidth_opt 개념만 · modern 없음. -->
<html lang="ko" data-eng="alv-layout-toggles">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layout 토글 패널 · CH17-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/alv-layout-toggles.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">Layout 토글 패널 <small>(LVC_S_LAYO)</small></p>
  <p class="lead">옵션을 켜고 끄면 미리보기 표가 즉시 바뀝니다. 특히 <code>cwidth_opt</code>를 끄면 <b>긴 고객명이 잘리고</b>, 켜면 컬럼이 넓어집니다. 바뀌는 건 <b>데이터가 아니라 표 전체 보기 설정</b>입니다.</p>

  <div class="alt-ctrl">
    <div class="alt-grp"><span class="clbl">옵션 (켜기/끄기)</span><div class="alt-opts"></div></div>
    <div class="alt-grp"><span class="clbl">sel_mode</span><div class="alt-sel"></div></div>
  </div>

  <p class="alt-h">미리보기</p>
  <div id="altPreview"></div>

  <div id="altMsg"></div>

  <div class="note"><b>채우기 ≠ 전달.</b> <code>ls_layout</code>을 채워도 <code>set_table_for_first_display</code>의 <code>is_layout</code>에 넘겨야 적용됩니다. 만들었는지와 전달했는지를 따로 확인하세요.</div>
</div>

<script>
window.ALT_CFG = {
  title: '예매 목록', longKey: 'customer',
  cols: [
    { key: 'booking_id', label: '예매번호' },
    { key: 'customer', label: '예매자' },
    { key: 'seats', label: '좌석수' },
    { key: 'status', label: '상태' }
  ],
  rows: [
    { booking_id: '5001', customer: '정훈영', seats: '2', status: 'N' },
    { booking_id: '5002', customer: '손흥민 단체예약 대표자', seats: '8', status: 'N' },
    { booking_id: '5003', customer: '아이유', seats: '3', status: 'N' },
    { booking_id: '5004', customer: '차은우', seats: '5', status: 'N' }
  ]
};
</script>
<script src="../_engine/alv-layout-toggles.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
