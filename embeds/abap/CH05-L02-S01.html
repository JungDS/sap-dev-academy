<!DOCTYPE html>
<!-- CH05-L02-S01 — 엔진: struct-viz(재사용) + _autoheight · _engine/_base.css. DDIC Structure ZST_PERSON 트리.
     Component 타입 = Data Element(라벨 상속 표기) · gs_person-name 대입 인터랙션. config=window.SV_CFG.
     게이팅: DDIC Structure·Data Element만(CH05-L02까지). -->
<html lang="ko" data-eng="struct-viz">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZST_PERSON 트리 · CH05-L02-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/struct-viz.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">DDIC Structure — <code>ZST_PERSON</code>을 트리로</p>
  <p class="lead">로컬 <code>BEGIN OF</code>와 <b>쓰는 법은 똑같은데</b>, ABAP Dictionary(SE11)에 정의되어 있고 Component마다 <b>Data Element</b>가 붙어 라벨까지 상속됩니다. 값 대입도 눌러 보세요.</p>
  <div data-structviz></div>
</div>
<script>
window.SV_CFG = {
  root: 'gs_person',
  kind: 'TYPE zst_person — DDIC Structure(SE11·전역)',
  comps: [
    { name: 'name',   type: 'ZDE_NAME → CHAR 20 (라벨: 이름)' },
    { name: 'age',    type: 'ZDE_AGE → NUMC 3 (라벨: 나이)' },
    { name: 'amount', type: 'ZDE_AMOUNT → DEC 8,2 (라벨: 금액)' }
  ],
  assign: { comp: 'name', value: '정훈영', stmt: "gs_person-name = '정훈영'." },  // 칸 값=맨값(따옴표는 실행문에만)
  note: 'Component 타입을 <b>Data Element</b>로 줬기 때문에 화면·ALV에서 <b>라벨("이름"·"나이"·"금액")이 공짜</b>로 따라옵니다(앞 챕터에서 Data Element를 만들며 받은 보상과 같은 원리). ABAP Dictionary에 <b>정의한 하나</b>를 여러 프로그램이 공유합니다.'
};
</script>
<script src="../_engine/struct-viz.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
