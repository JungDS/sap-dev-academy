<div class="wrap">
  <p class="hd">표준이 마련한 빈 자리 — User / Customer Exit</p>
  <p class="lead">SAP 표준은 직접 고치지 않습니다. 표준이 부르는 <b>빈 FORM/함수(Exit)</b>에 내 코드만 넣으면, <b>표준 소스는 그대로</b>인 채 동작이 확장됩니다. 토글로 켜고 꺼 보세요.</p>
  <div class="bar"><button class="toggle" id="toggle" type="button"><span class="sw"></span><span id="swtxt">확장 적용: OFF</span></button><span class="badge">표준 소스 변경 0줄</span></div>

  <div class="note">💡 <code>SMOD</code>(Exit 조회)·<code>CMOD</code>(프로젝트로 활성화). 오래된 방식이라 신규 개발은 <b>BAdI</b>(L03)·Enhancement(L02)를 선호합니다.</div>
  <script type="application/json" id="is-cfg">
  {
    "progName": "SAPMV45A (표준 판매 처리)",
    "slotLabel": "User Exit 자리 — 표준이 부르는 빈 FORM",
    "lines": [
      { "t": "std", "x": "FORM userexit_save_document_prepare." },
      { "t": "slot" },
      { "t": "std", "x": "ENDFORM." }
    ],
    "my": [
      "  \" 내 확장: VIP 고객이면 메모 자동 기록",
      "  IF is_vip( kunnr ).",
      "    vbak-bezei = 'VIP 우선 처리'.",
      "  ENDIF."
    ],
    "emptyMsg": "(비어 있음 — 표준 기본 저장 동작만)"
  }
  </script>
