<!DOCTYPE html>
<!-- CH02-L02-S01 — 엔진: var-box(재사용) + _autoheight · _engine/_base.css. Complete 타입 5종 모양+기본값.
     STRING(가변)·I·F·D·T 박스 — 선언 직후(타입 기본값) ↔ 값 대입 토글. config=window.VB_CFG.
     게이팅: DATA·TYPE·Complete 타입만(CH02-L02까지) — 연산·P 타입 미사용. -->
<html lang="ko" data-eng="var-box">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Complete 타입 5종 박스 · CH02-L02-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/var-box.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">Complete 타입 5종 — 박스 모양과 타입 기본값</p>
  <p class="lead">선언만 해도 박스 안엔 이미 <b>타입 기본값</b>이 들어 있습니다(빈 것이 아님!). <b>값 넣기</b>를 눌러 대입 후 모습과 비교해 보세요. <code>D</code>는 8자리(<code>YYYYMMDD</code>), <code>T</code>는 6자리(<code>HHMMSS</code>) 문자 뼈대라는 게 기본값에서부터 보입니다.</p>
  <div data-varbox></div>
</div>
<script>
window.VB_CFG = {
  vars: [
    { name: 'gv_text',  type: 'string', value: "'정훈영'" },
    { name: 'gv_qty',   type: 'i',      value: '15' },
    { name: 'gv_rate',  type: 'f',      value: "'1.5'" },
    { name: 'gv_today', type: 'd',      value: "'20260702'" },
    { name: 'gv_now',   type: 't',      value: "'143000'" }
  ],
  note: '<b>STRING</b>은 내용만큼 늘어나는 <b>가변</b> 박스, 나머지는 크기가 정해진 박스입니다. <code>F</code>에 넣은 <code>\'1.5\'</code>에 따옴표가 붙은 이유: ABAP에서 마침표(<code>.</code>)는 문장의 끝이라, 소수는 따옴표로 감싸 적습니다(본문 "숫자를 적는 법").'
};
</script>
<script src="../_engine/var-box.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
