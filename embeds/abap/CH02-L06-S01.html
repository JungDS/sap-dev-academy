<head>

<title>Text Symbol 빈칸 채우기 · CH02-L06-S01</title>

<body>
<div class="wrap">
  <p class="hd">Text Symbol — 텍스트를 번호로 <small>(빈칸 채우기)</small></p>
  <p class="lead">화면 텍스트를 코드에 박지 않고 <b>세 자리 번호</b>로 빼면 로그인 언어에 따라 바뀝니다. 빈칸을 채워 완성해 보세요.</p>

  <div class="fillblank" data-fillblank
       data-explain="Text Symbol은 화면 텍스트를 세 자리 번호로 빼 언어별로 관리합니다(로그인 언어 따라 자동 전환)."
       data-hint="TEXT-nnn (세 자리) · '기본값'(nnn)">
    <div class="fb-hd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div>
<pre><span class="cmt">" 화면 텍스트를 번호로 빼서 다국어로</span>
WRITE: / <input class="blank" data-answer="TEXT" placeholder="____" aria-label="빈칸1">-001, gv_amt.

<span class="cmt">" 기본값 + 번호 (번역 없어도 한국어 표시)</span>
WRITE: / '금액'(<input class="blank" data-answer="001" placeholder="___" aria-label="빈칸2">).</pre>
    <div class="fillblank__actions">
      <button class="btn" data-check type="button">채점하기</button>
      <button class="btn ghost" data-reveal type="button">정답 보기</button>
      <button class="btn ghost" data-reset type="button">다시하기</button>
    </div>
    <div class="fill-output">빈칸을 채우고 "채점하기"를 눌러 보세요.</div>
  </div>
</div>
