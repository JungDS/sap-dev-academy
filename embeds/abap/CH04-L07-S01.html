<body>
<div class="wrap">
  <p class="hd">구구단 — 빈칸 채우기 <small>(DO·sy-index·*)</small></p>
  <p class="lead">반복(<code>DO</code>)·회차(<code>sy-index</code>)·곱셈(<code>*</code>)으로 한 단을 완성해 보세요.</p>

  <div class="fillblank" data-fillblank
       data-explain="구구단 = DO n TIMES 반복 + sy-index(회차) + 곱셈(*). 반복은 ENDDO로 닫습니다."
       data-hint="DO n TIMES · sy-index · * · ENDDO">
    <div class="fb-hd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div>
<pre>PARAMETERS p_dan TYPE i.
DATA: gv_mul TYPE i, gv_res TYPE i.

DO 9 <input class="blank" data-answer="TIMES" placeholder="_____" aria-label="빈칸1">.
  gv_mul = <input class="blank" data-answer="sy-index" placeholder="________" aria-label="빈칸2">.
  gv_res = p_dan <input class="blank" data-answer="*" placeholder="_" aria-label="빈칸3"> gv_mul.
  WRITE: / p_dan, 'x', gv_mul, '=', gv_res.
<input class="blank" data-answer="ENDDO" placeholder="_____" aria-label="빈칸4">.</pre>
    <div class="fillblank__actions">
      <button class="btn" data-check type="button">채점하기</button>
      <button class="btn ghost" data-peek type="button">👁 잠깐 보기</button>
      <button class="btn ghost" data-reveal type="button">정답 보기</button>
      <button class="btn ghost" data-reset type="button">다시하기</button>

    <div class="fill-output">빈칸을 채우고 "채점하기"를 눌러 보세요.</div>
