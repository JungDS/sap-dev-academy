<!DOCTYPE html>
<!-- CH18-L07-S01 — 엔진: cond-switch-selector · _autoheight. 콘텐츠=레슨 전용(COND·SWITCH, CH18 L07).
     게이팅: 값 생성 표현식 시연만 · 흐름 제어(IF/CASE)와 구분 강조. -->
<html lang="ko" data-eng="cond-switch-selector">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조건 표현식 선택기 · CH18-L07-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/cond-switch-selector.css" />
</head>
<body>
<div class="wrap" data-css>
  <p class="hd">조건 표현식 선택기 <small>(COND · SWITCH)</small></p>
  <p class="lead"><code>COND</code>는 범위 조건(잔여석)으로, <code>SWITCH</code>는 상수 비교(상태 코드)로 <b>값 하나</b>를 정합니다. 값을 바꿔 어떤 가지가 선택되는지, <code>ELSE</code>를 빼면 어떻게 되는지 보세요.</p>

  <div class="css-ctrl">
    <label>잔여석 <input type="number" id="cssRem" value="5" min="0" max="200"></label>
    <label>상태
      <select id="cssStat">
        <option value="N">N</option>
        <option value="C">C</option>
        <option value="Z">Z(기타)</option>
      </select>
    </label>
    <label><input type="checkbox" id="cssElse" checked> ELSE 포함</label>
  </div>

  <div class="css-grid">
    <div class="css-panel"><div class="css-ptt">COND string( 잔여석 )</div><div class="css-pbody" id="cssCond"></div></div>
    <div class="css-panel"><div class="css-ptt">SWITCH string( 상태 )</div><div class="css-pbody" id="cssSwitch"></div></div>
  </div>

  <div class="note"><b>값을 만드는 도구</b>입니다. 조건마다 저장·화면 호출 같은 <b>동작</b>이 필요하면 표현식이 아니라 <code>IF</code>/<code>CASE</code>가 맞습니다. <code>ELSE</code>를 빼면 일치 없을 때 <b>초기값</b>(빈 문자)이 됩니다.</div>
</div>
<script src="../_engine/cond-switch-selector.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
