<!DOCTYPE html>
<!-- CH02-L04-S01 — 엔진: type-stamp(신규) + _autoheight · _engine/_base.css. TYPES 도면→DATA 실물.
     DECIMALS 2↔3 토글→변수 3개 동시 반영 · ty_amount 값 대입 시도→오류 데모. config=window.TS_CFG.
     게이팅: TYPES·DATA·P 타입만(CH02-L04까지). -->
<html lang="ko" data-eng="type-stamp">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TYPES 도면 → DATA 실물 · CH02-L04-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/type-stamp.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">TYPES 도면 → DATA 실물</p>
  <p class="lead"><code>TYPES</code>는 <b>도면</b>(메모리 0바이트), <code>DATA</code>는 그 도면으로 찍어낸 <b>실물</b>입니다. 도면의 <b>DECIMALS</b>를 바꿔 보세요. 실물 변수 3개가 한꺼번에 바뀝니다. 도면에 값을 직접 넣으면 어떻게 되는지도 눌러 보세요.</p>
  <div data-ts></div>
</div>
<script>
window.TS_CFG = {
  typeName: 'ty_amount',
  base: 'p LENGTH 8',
  decOptions: [2, 3],
  dec: 2,
  vars: [
    { name:'gv_price', raw:1000 },
    { name:'gv_tax',   raw:100 },
    { name:'gv_total', raw:1100 }
  ],
  note: '금액 자릿수 정책이 바뀌어도 고칠 곳은 <b><code>TYPES</code> 한 줄</b>입니다. 그 타입을 쓰는 변수 전부가 따라옵니다. 반대로 도면(<code>ty_amount</code>)에는 값을 담을 수 없습니다(값은 실물 변수에만).'
};
</script>
<script src="../_engine/type-stamp.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
