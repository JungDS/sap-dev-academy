<!DOCTYPE html>
<!-- CH24-L01-S01 — 엔진: dml-playground (embeds/_engine/dml-playground.{js,css}) · 공통토큰: _engine/_base.css
     DML 4종(INSERT/UPDATE/MODIFY/DELETE)을 ZBOOKING 미니테이블에 실행해 보는 체험. -->
<html lang="ko" data-eng="dml-playground">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DML 플레이그라운드 · CH24-L01-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/dml-playground.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">DML 플레이그라운드 — <code>ZBOOKING</code>을 직접 바꿔 보기</p>
  <p class="lead">연산을 고르고 값을 넣어 <b>실행</b>하면 테이블이 바뀝니다. 같은 키로 <code>INSERT</code> 두 번, <code>WHERE</code> 없는 <code>DELETE</code>도 해 보세요(내 테이블이라 안전).</p>

  <div class="panel">
    <div class="ops">
      <button class="op on" data-op="INSERT" type="button">INSERT</button>
      <button class="op" data-op="UPDATE" type="button">UPDATE</button>
      <button class="op" data-op="MODIFY" type="button">MODIFY</button>
      <button class="op" data-op="DELETE" type="button">DELETE</button>
    </div>
    <div class="form">
      <div class="fld" id="keyFld"><label>booking_id (키)</label><input id="key" placeholder="1003" maxlength="6" autocomplete="off" /></div>
      <div class="fld"><label>승객</label><input id="pax" placeholder="아이유" maxlength="8" autocomplete="off" /></div>
      <div class="fld"><label>좌석</label><input id="seats" placeholder="2" maxlength="3" autocomplete="off" /></div>
      <div class="fld"><label>상태</label><select id="st"><option>O</option><option>X</option></select></div>
      <label class="chkwrap" id="skipWrap" style="display:none"><input type="checkbox" id="skip" /> WHERE 생략(전체)</label>
      <button class="reset" id="reset" type="button">↺ 초기화</button>
      <button class="run" id="run" type="button">▶ 실행</button>
    </div>
    <div class="echo" id="echo"></div>
    <div class="tblwrap">
      <table>
        <thead><tr><th>booking_id</th><th>승객</th><th>좌석</th><th>상태</th><th>created_by</th><th>created_on</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="msg info" id="msg"></div>
  </div>

  <div class="note">💡 <b>INSERT</b> 중복키=덤프 · <b>MODIFY</b>=있으면 수정·없으면 추가(upsert) · <b>UPDATE/DELETE</b>는 <code>WHERE</code>를 빼면 전체에 적용(사고 주의). 신규 행엔 감사필드(<code>created_by</code>·<code>created_on</code>)가 자동으로 찍힙니다.</div>
</div>
<script src="../_engine/dml-playground.js" defer></script>
</body>
</html>
