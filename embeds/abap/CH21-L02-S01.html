<!DOCTYPE html>
<!-- CH21-L02-S01 — 엔진: visibility-gate-sim · _autoheight. 콘텐츠=레슨 전용(Attribute/Method/Visibility, CH21 L02).
     config=window.VGS_CFG. 게이팅: CH21=OO 정식(visibility PUBLIC/PROTECTED/PRIVATE·캡슐화). 상속 자식은 다음 레슨들이라 개념만 비교용. -->
<html lang="ko" data-eng="visibility-gate-sim">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visibility Gate Simulator · CH21-L02-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/visibility-gate-sim.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">Visibility Gate Simulator <small>(누가 접근할 수 있나)</small></p>
  <p class="lead">클래스 멤버를 <code>PUBLIC</code>·<code>PROTECTED</code>·<code>PRIVATE</code> 중 어디에 둘지, 누가 접근할지 바꿔 보세요. 접근이 <b>막히면 런타임이 아니라 컴파일(syntax check) 단계</b>에서 막힙니다. 멤버 종류에 맞는 <b>캡슐화 조언</b>도 함께 봅니다.</p>

  <div class="vgs-ctrl">
    <div class="vgs-grp"><span class="clbl">멤버</span><div class="vgs-seg vgs-mem"></div></div>
    <div class="vgs-grp"><span class="clbl">공개 범위</span><div class="vgs-seg vgs-vis"></div></div>
    <div class="vgs-grp"><span class="clbl">호출자</span><div class="vgs-seg vgs-caller"></div></div>
  </div>

  <p class="vgs-h">코드</p>
  <div id="vgsCode"></div>
  <div id="vgsVerdict"></div>
  <div id="vgsAdvice"></div>
  <p class="vgs-h" style="margin-top:12px">접근 규칙 한눈에</p>
  <div id="vgsMatrix"></div>
</div>

<script>
window.VGS_CFG = {
  members: [
    { v: 'cap', label: 'mv_cap (데이터)', kind: 'data', name: 'mv_cap' },
    { v: 'rem', label: 'remaining( ) (행동)', kind: 'method', name: 'remaining( )' }
  ]
};
</script>
<script src="../_engine/visibility-gate-sim.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
