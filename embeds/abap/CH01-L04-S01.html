<!DOCTYPE html>
<!-- CH01-L04-S01 — 엔진: write-output (embeds/_engine/write-output.{js,css}) · 공통토큰: _engine/_base.css
     ⚠️ 생성: tools/_extract-embed.mjs (sample/code-learning/write-output-simulator.html에서 추출). 엔진 수정은 _engine/에서. -->
<html lang="ko" data-eng="write-output">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WRITE 출력 시뮬레이터 · CH01-L04-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/write-output.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">WRITE 출력 시뮬레이터 <small>(직접 고쳐 실행)</small></p>
  <p class="lead">코드를 마음대로 고치고 <b>▶ 실행(F8)</b>을 누르면, SAP 리스트 화면에 결과가 그려집니다. <code>/</code>를 넣고 빼며 <b>줄바꿈이 어떻게 달라지는지</b> 직접 확인해 보세요.</p>

  <div class="presets" id="presets">
    <span class="presets__lbl">예제:</span>
    <button class="chip" type="button" data-ex="0">한 줄 출력</button>
    <button class="chip" type="button" data-ex="1">이어 붙기 (/ 없음)</button>
    <button class="chip" type="button" data-ex="2">줄바꿈 (/)</button>
    <button class="chip" type="button" data-ex="3">콜론(:) 체인</button>
  </div>

  <div class="split">
    <div class="pane">
      <div class="ed__hd">
        <span class="ed__dots"><i class="r"></i><i class="y"></i><i class="g"></i></span>
        <span class="ed__lang">ABAP</span>
        <span class="ed__title">ZHELLO</span>
        <button class="run-btn" id="run" type="button">▶ 실행 <kbd>F8</kbd></button>
      </div>
      <div class="code-wrap"><pre class="gutter" id="gutter">1</pre><textarea class="code" id="code" spellcheck="false" wrap="off"></textarea></div>
    </div>
    <div class="pane">
      <div class="out__hd"><span class="sq"></span>리스트 &nbsp;—&nbsp; 실행 결과</div>
      <div class="screen" id="screen"></div>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="note" id="note"><b>규칙 3가지</b> — 같은 줄에 이어 쓰기 = <code>/</code> 없음 · 줄바꿈 = <code>/</code> · 여러 값 한 번에 = <code>WRITE:</code> 뒤 콤마(<code>,</code>)로 나열.</div>
</div>
<script>window.__SDA_CFG__=Object.assign(window.__SDA_CFG__||{},{examples:[
    "REPORT zhello.\n\nWRITE 'Hello, ABAP!'.",
    "REPORT zhello.\n\n* / 가 없으면 같은 줄에 이어 붙는다\nWRITE 'first'.\nWRITE 'second'.\nWRITE 'third'.",
    "REPORT zhello.\n\n* / 를 붙이면 새 줄로 내려간다\nWRITE 'first line'.\nWRITE / 'second line'.\nWRITE / 'third line'.",
    "REPORT zhello.\n\n* WRITE: 뒤 콤마로 여러 값을 한 번에\nWRITE: / 'A', 'B', 'C',\n       / 'D', 'E'."
  ]});</script>
<script src="../_engine/write-output.js" defer></script>
</body>
</html>
