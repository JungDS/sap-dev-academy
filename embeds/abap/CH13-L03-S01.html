<!DOCTYPE html>
<!-- CH13-L03-S01 — 엔진: group-by-lab · _autoheight. 콘텐츠=레슨 전용(GROUP BY·집계·DISTINCT, CH13 L03).
     config=window.GBL_CFG. 게이팅: classic GROUP BY/COUNT/SUM/MAX·DISTINCT 개념만 · HAVING/modern/comma 없음. -->
<html lang="ko" data-eng="group-by-lab">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>행 묶기 실험실 · CH13-L03-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/group-by-lab.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">행 묶기 실험실 <small>(GROUP BY · COUNT · SUM)</small></p>
  <p class="lead"><b>그룹 키</b>를 바꾸면 같은 키 행이 같은 색으로 묶이고, <b>GROUP BY</b>는 그 그룹을 한 행으로 접어 <code>COUNT</code>·<code>SUM</code>을 계산합니다. <code>DISTINCT</code>는 요약 없이 중복만 제거합니다.</p>

  <div class="gbl-ctrl">
    <div class="grp"><span class="clbl">그룹 키</span><div class="gbl-seg gbl-keys"></div></div>
    <div class="grp"><span class="clbl">모드</span><div class="gbl-seg gbl-mode"></div></div>
  </div>

  <div class="gbl-cols">
    <div class="gbl-col">
      <p class="gbl-h">원본 zbooking (그룹별 색)</p>
      <table class="gbl-tbl"><tbody class="gbl-src" id="gblSrc"></tbody></table>
    </div>
    <div class="gbl-col">
      <p class="gbl-h">결과</p>
      <div id="gblRes"></div>
    </div>
  </div>

  <div class="gbl-note" id="gblNote"></div>

  <div class="note"><b>GROUP BY = 요약, DISTINCT = 중복 제거.</b> "공연별 예매 건수·좌석 합계"는 <code>GROUP BY</code>+<code>COUNT/SUM</code>, "등장한 공연ID만"은 <code>DISTINCT</code>. 합계 필드 타입은 개별 값보다 넉넉히(오버플로 주의).</div>
</div>

<script>
window.GBL_CFG = {
  sumField: 'seats',
  cols: [
    { key: 'booking_id', label: '예매', num: true },
    { key: 'concert_id', label: '공연' },
    { key: 'seats', label: '좌석', num: true },
    { key: 'status', label: '상태' }
  ],
  groupOptions: [
    { label: 'concert_id', keys: ['concert_id'] },
    { label: 'status', keys: ['status'] },
    { label: 'concert_id + status', keys: ['concert_id', 'status'] }
  ],
  rows: [
    { booking_id: 5001, concert_id: 'C001', seats: 2, status: 'N' },
    { booking_id: 5002, concert_id: 'C001', seats: 4, status: 'N' },
    { booking_id: 5003, concert_id: 'C001', seats: 3, status: 'N' },
    { booking_id: 5004, concert_id: 'C002', seats: 1, status: 'C' },
    { booking_id: 5005, concert_id: 'C002', seats: 2, status: 'N' },
    { booking_id: 5006, concert_id: 'C001', seats: 5, status: 'N' }
  ]
};
</script>
<script src="../_engine/group-by-lab.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
