<!DOCTYPE html>
<!-- CH14-L06-S01 — 엔진: view-cluster-tree · _autoheight. 콘텐츠=레슨 전용(View Cluster 계층 유지보수, CH14 L06).
     config=window.VCT_CFG. 게이팅: classic View Cluster·SE54·계층 유지보수 개념만 · CDS/modern 없음. -->
<html lang="ko" data-eng="view-cluster-tree">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>계층 유지보수 지도 — View Cluster · CH14-L06-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/view-cluster-tree.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">계층 유지보수 지도 <small>(View Cluster)</small></p>
  <p class="lead">왼쪽에서 <b>공연장</b>을 고르면 그 아래 <b>좌석등급</b>만 좁혀 보입니다. 상위에서 고른 값이 하위 유지보수의 <b>자동 조건</b>이 됩니다 — 이게 여러 SM30 링크를 모은 것과의 차이입니다.</p>

  <div class="vct-cols">
    <div class="vct-left">
      <p class="vct-h">공연장 ZHALL (상위)</p>
      <div id="vctTree"></div>
    </div>
    <div class="vct-right">
      <p class="vct-h">유지보수 패널 (하위)</p>
      <p class="vct-panel__hd" id="vctPanelHd"></p>
      <div id="vctGrid"></div>
    </div>
  </div>

  <div class="vct-status" id="vctStatus"></div>

  <div class="note"><b>구조를 작업 순서로 번역.</b> View Cluster는 Foreign Key로 이어진 관련 객체를 업무 계층으로 묶어, 사용자가 상위→하위로 따라가며 관리하게 합니다. 단일 코드 테이블 하나면 SM30이 더 단순합니다.</div>
</div>

<script>
window.VCT_CFG = {
  presets: [
    { grade: 'A', name: 'VIP', price: 120000 },
    { grade: 'B', name: '일반', price: 70000 },
    { grade: 'C', name: '입석', price: 40000 }
  ],
  halls: [
    { id: 'H01', name: '블루홀', grades: [{ grade: 'A', name: 'VIP', price: 120000 }, { grade: 'B', name: '일반', price: 70000 }] },
    { id: 'H02', name: '그린홀', grades: [{ grade: 'B', name: '일반', price: 60000 }] }
  ]
};
</script>
<script src="../_engine/view-cluster-tree.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
