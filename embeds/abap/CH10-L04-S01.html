<!DOCTYPE html>
<!-- CH10-L04-S01 — 엔진: local-class-stepper (embeds/_engine/local-class-stepper.{js,css}) · 자체 postHeight.
     체험: DEFINITION(계약)·IMPLEMENTATION(본문)·=> 정적 호출 구분, 호출 결과, PUBLIC/RETURNING 제거 실험.
     게이팅: static method 맛보기만(객체 생성·인스턴스·상속은 CH20). VALUE(...)는 RETURNING 문법. -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Class 정적 메서드 스텝퍼 · CH10-L04-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/local-class-stepper.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">Local Class 정적 메서드 스텝퍼 <small>(맛보기)</small></p>
  <p class="lead">class도 코드를 <b>이름 붙은 책임 단위</b>로 묶는 도구입니다. 세 덩어리를 눌러 색으로 확인하세요 — <b>DEFINITION</b>(공개 계약), <b>IMPLEMENTATION</b>(실제 본문), <code>=&gt;</code>(객체 없이 정적 호출).</p>

  <div class="toolbar" id="toolbar">
    <button class="btn" data-a="def" type="button">① DEFINITION</button>
    <button class="btn" data-a="impl" type="button">② IMPLEMENTATION</button>
    <button class="btn" data-a="call" type="button">③ 정적 호출</button>
    <button class="btn go" data-a="run" type="button">▶ 호출 실행</button>
    <button class="btn exp" data-a="nopub" type="button">PUBLIC 제거</button>
    <button class="btn exp" data-a="noret" type="button">RETURNING 제거</button>
  </div>

  <div class="stage">
    <div class="codebox"><div class="codebox__hd">ABAP · Local Class</div><div id="code"></div></div>
    <div class="side">
      <div class="card"><div class="card__t">공개 계약 (DEFINITION)</div><div id="contract"></div></div>
      <div class="card"><div class="card__t">호출 형식</div><div class="callfmt" id="callfmt"></div></div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div class="note"><b>맛보기 경계</b> — 여기선 <code>CLASS-METHODS</code>(정적 메서드)를 <code>=&gt;</code>로 객체 없이 부르는 감각만 잡습니다. 객체 생성·인스턴스 메서드·상속·인터페이스는 <a href="CH20-L01.html">CH20</a>에서 정식으로 배웁니다.</div>
</div>

<script src="../_engine/local-class-stepper.js" defer></script>
</body>
</html>
