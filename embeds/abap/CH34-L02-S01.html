<div class="wrap">
  <p class="hd">Smart Forms vs Adobe Forms</p>
  <p class="lead">양식 이름을 클릭하면 "언제 쓰나"가 나옵니다. 신규 개발은 보통 Adobe Forms를 선호합니다.</p>
  <p class="hint">💡 행(양식 이름)을 클릭</p>
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  <div class="detail idle" id="detail">양식 이름을 클릭하면 권장 상황이 나옵니다.</div>
  <div class="note">💡 둘 다 <b>Form Interface</b>로 데이터를 받고 <b>생성 함수</b>를 호출하는 점은 같습니다. Adobe Forms는 PDF·인터랙티브에 강하지만 <b>ADS</b>(Adobe Document Services)가 필요합니다.</div>
  <script type="application/json" id="cm-cfg">
  {
    "cols": ["PDF/인터랙티브", "디자이너", "ADS 필요", "신규 권장"],
    "rows": [
      { "name": "Smart Forms", "cells": [{"v":"보통","r":"mid"},{"v":"내장 GUI","r":"mid"},{"v":"불필요","r":"hi"},{"v":"△","r":"mid"}],
        "detail": "기존 자산·간단한 인쇄 양식. 내장 그래픽 디자이너, ADS 없이 동작. 레거시가 많아 <b>읽고 유지보수</b>할 일이 많음." },
      { "name": "Adobe Forms", "cells": [{"v":"강함","r":"hi"},{"v":"LiveCycle Designer","r":"hi"},{"v":"필요","r":"lo"},{"v":"○","r":"hi"}],
        "detail": "PDF 네이티브·인터랙티브 폼. 정교한 레이아웃·법적 양식. <b>신규 개발 권장</b>(ADS 설정 전제)." }
    ]
  }
  </script>
