<!DOCTYPE html>
<!-- CH05-L05-S01 — 엔진: step-debugger (embeds/_engine/step-debugger.{js,css}) + _autoheight.js
     config=레슨 전용(구구단 한 줄=Structure 캡스톤 ls_line, #C05-2). 게이팅: 내부테이블·inline DATA() 없음(classic). -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>구구단 구조체 디버거 · CH05-L05-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/step-debugger.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">구구단 한 줄 = Structure — 반복마다 갱신 <small>(스텝 디버거)</small></p>
  <p class="lead"><b>다음 ⏭</b>을 누를 때마다 <code>DO</code>가 한 바퀴 돕니다. <code>ls_line</code> 안의 <code>mul</code>·<code>result</code>가 회차(<code>sy-index</code>)마다 갱신되는 모습을 보세요.</p>

  <div class="dbg" data-stepper>
    <div class="dbg__bar">
      <button class="btn btn--primary" data-start>▶ 시작</button>
      <button class="btn btn--step" data-next disabled>다음 ⏭</button>
      <div class="progress"><i data-progress></i></div>
      <span class="muted" data-counter>0 / 10</span>
    </div>
    <div class="dbg__main">
      <div class="dbg__editorwrap"><div class="dbg__edhd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div><div class="dbg__editor" data-code></div></div>
      <div class="dbg__watch">
        <div class="watch__head">변수 모니터 — <code>ls_line</code> 펼침</div>
        <div class="watch__list" data-vars></div>
      </div>
    </div>
    <div class="dbg__console">
      <div class="console__head">
        <span>콘솔</span>
        <span class="leg"><span class="a">▶ 실행할 차례</span> · <span class="d">✓ 방금 실행</span></span>
        <span class="sp"></span>
        <span class="cmode"><button class="cmode__b on" data-cmode="cur">현재 행</button><button class="cmode__b" data-cmode="all">전체 출력</button></span>
      </div>
      <pre class="console__body" data-console>대기 중 — ▶ 시작을 누르세요.</pre>
    </div>
    <script type="application/json" class="stepper-config">
    {
      "code":[
        "DATA: BEGIN OF ls_line,",
        "        dan    TYPE i,",
        "        mul    TYPE i,",
        "        result TYPE i,",
        "      END OF ls_line.",
        "",
        "ls_line-dan = 2.            \" 2단",
        "",
        "DO 9 TIMES.",
        "  ls_line-mul    = sy-index.",
        "  ls_line-result = ls_line-dan * ls_line-mul.",
        "  WRITE: / ls_line-dan, 'x', ls_line-mul, '=', ls_line-result.",
        "ENDDO."
      ],
      "vars":[
        {"label":"ls_line-dan","sub":"dan · 단","key":"ls_line-dan","init":"0"},
        {"label":"ls_line-mul","sub":"mul · 곱하는 수","key":"ls_line-mul","init":"0"},
        {"label":"ls_line-result","sub":"result · 결과","key":"ls_line-result","init":"0"},
        {"label":"sy-index","sub":"반복 회차","key":"sy-index","init":"-"}
      ],
      "steps":[
        {"line":7,"vars":{"ls_line-dan":"2"},"console":"ls_line-dan = 2 → 2단 준비"},
        {"line":11,"vars":{"sy-index":"1","ls_line-mul":"1","ls_line-result":"2"},"console":"2 x 1 = 2"},
        {"line":11,"vars":{"sy-index":"2","ls_line-mul":"2","ls_line-result":"4"},"console":"2 x 2 = 4"},
        {"line":11,"vars":{"sy-index":"3","ls_line-mul":"3","ls_line-result":"6"},"console":"2 x 3 = 6"},
        {"line":11,"vars":{"sy-index":"4","ls_line-mul":"4","ls_line-result":"8"},"console":"2 x 4 = 8"},
        {"line":11,"vars":{"sy-index":"5","ls_line-mul":"5","ls_line-result":"10"},"console":"2 x 5 = 10"},
        {"line":11,"vars":{"sy-index":"6","ls_line-mul":"6","ls_line-result":"12"},"console":"2 x 6 = 12"},
        {"line":11,"vars":{"sy-index":"7","ls_line-mul":"7","ls_line-result":"14"},"console":"2 x 7 = 14"},
        {"line":11,"vars":{"sy-index":"8","ls_line-mul":"8","ls_line-result":"16"},"console":"2 x 8 = 16"},
        {"line":11,"vars":{"sy-index":"9","ls_line-mul":"9","ls_line-result":"18"},"console":"2 x 9 = 18 — 9바퀴 끝, mul·result가 매번 갱신됨"}
      ]
    }
    </script>
  </div>
</div>
<script src="../_engine/step-debugger.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
