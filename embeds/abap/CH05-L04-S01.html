<!DOCTYPE html>
<!-- CH05-L04-S01 — 엔진: move-mapping(신규) + _autoheight · _engine/_base.css. MOVE-CORRESPONDING 매핑 보드.
     같은 이름만 복사(초록)·원본-only 무시(주황)·대상-only 잔존(회색→빨강 함정)·CLEAR 먼저 토글. config=window.MM_CFG.
     근거: abapmove-corresponding.htm "identically named... other components are not affected".
     게이팅: MOVE-CORRESPONDING·CLEAR만(CH05-L04까지) — modern CORRESPONDING #()는 CH18. -->
<html lang="ko" data-eng="move-mapping">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOVE-CORRESPONDING 매핑 보드 · CH05-L04-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" /><link rel="stylesheet" href="../_engine/move-mapping.css" />
</head>
<body>
<div class="wrap">
  <p class="hd">MOVE-CORRESPONDING — 같은 이름만 건너간다</p>
  <p class="lead"><b>실행</b>을 눌러 어떤 필드가 건너가는지 보세요. 그리고 <code>CLEAR</code> 토글을 끈 채로도 실행해서, 대상에만 있는 <code>city</code>에 <b>이전 값이 남는 함정</b>을 직접 겪어 보세요.</p>
  <div data-mm></div>
</div>
<script>
window.MM_CFG = {
  src: { name: 'gs_src', fields: [
    { n: 'name',   v: "'정훈영'",   t: 'string' },
    { n: 'age',    v: '30',        t: 'i' },
    { n: 'amount', v: "'1500.50'", t: 'p 8,2' }
  ]},
  tgt: { name: 'gs_tgt', fields: [
    { n: 'name',                t: 'string' },
    { n: 'age',                 t: 'i' },
    { n: 'city', pre: "'Seoul'", t: 'string' }
  ]},
  note: '공식 규칙 그대로입니다 — <b>이름이 같은 Component만</b> 서로 대입되고, 나머지는 <b>건드리지 않는다</b>(원본-only는 무시, 대상-only는 그대로). 그래서 새 건을 채울 때는 <code>CLEAR</code>가 먼저입니다.'
};
</script>
<script src="../_engine/move-mapping.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
