<!DOCTYPE html>
<!-- CH18-L09-S01 — 엔진: let-reader · _autoheight. 콘텐츠=레슨 전용(LET...IN 독해, CH18 L09).
     게이팅: modern expression 독해 시연만 · THROW/예외는 CH20 경계로만. -->
<html lang="ko" data-eng="let-reader">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LET 표현식 독해기 · CH18-L09-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/let-reader.css" />
</head>
<body>
<div class="wrap" data-lr>
  <p class="hd">LET 표현식 독해기 <small>(LET … IN)</small></p>
  <p class="lead"><code>LET</code> 보조값은 <b>먼저 한 번</b> 계산되고, <code>IN</code> 뒤에서 그 이름으로 결과가 만들어집니다. 두 문맥에서 <span style="color:var(--amber);font-weight:700">보조값(LET)</span>과 <span style="color:var(--brand);font-weight:700">누적값(INIT)</span>의 역할 차이를 보세요.</p>

  <div class="lr-tabs">
    <button type="button" data-tab="cond" aria-pressed="true">COND 안 LET</button>
    <button type="button" data-tab="reduce" aria-pressed="false">REDUCE 안 LET</button>
  </div>
  <div class="lr-inputs">
    <label>정원 <input type="number" id="lrCap" value="100" min="0"></label>
    <label>예약 <input type="number" id="lrRes" value="95" min="0"></label>
  </div>
  <div id="lrView"></div>

  <div class="note"><b>LET은 표현식 안에서만 사는 이름표</b>입니다. 표현식 뒤에서 그 이름을 <code>WRITE</code>하려 하면 접근할 수 없습니다. 같은 계산을 <b>한 번만 이름 붙여야 더 명확할 때만</b> 씁니다.</div>
</div>
<script src="../_engine/let-reader.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
