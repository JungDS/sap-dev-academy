<!DOCTYPE html>
<!-- CH18-L06-S01 — 엔진: type-conversion-lab · _autoheight. 콘텐츠=레슨 전용(CONV·EXACT 변환, CH18 L06).
     게이팅: modern 변환 표현식 시연만 · 예외 처리는 CH21 경계로만 언급. -->
<html lang="ko" data-eng="type-conversion-lab">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>타입 변환 실험실 · CH18-L06-S01</title>
<link rel="stylesheet" href="../_engine/_base.css" />
<link rel="stylesheet" href="../_engine/type-conversion-lab.css" />
</head>
<body>
<div class="wrap" data-tcl>
  <p class="hd">타입 변환 실험실 <small>(CONV · EXACT)</small></p>
  <p class="lead"><code>CONV</code>는 그 자리에서 타입을 바꾸고(소수는 반올림), <code>EXACT</code>는 <b>손실이 나면 막습니다</b>(예외). 값을 넣고 세 가지로 변환해 결과와 위험을 비교해 보세요.</p>

  <div class="tcl-row">
    <label for="tclVal">값(문자):</label>
    <input type="text" id="tclVal" value="12.7" spellcheck="false">
  </div>
  <div class="tcl-btns">
    <button type="button" data-op="conv_i">CONV i( )</button>
    <button type="button" data-op="conv_s">CONV string( )</button>
    <button type="button" data-op="exact_i">EXACT i( )</button>
  </div>
  <div class="tcl-out" id="tclOut"></div>

  <div class="note"><b>변환은 의미를 바꾼다.</b> <code>'12.7'</code>을 <code>CONV i</code>로 바꾸면 13(반올림·손실), <code>EXACT i</code>로 바꾸면 예외입니다. 금액·수량처럼 한 자리도 틀리면 안 되는 값엔 <code>EXACT</code>가 안전합니다.</div>
</div>
<script src="../_engine/type-conversion-lab.js" defer></script>
<script src="../_engine/_autoheight.js" defer></script>
</body>
</html>
