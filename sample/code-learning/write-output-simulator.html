<!DOCTYPE html>
<!--
  WRITE 출력 시뮬레이터 — 직접 고쳐 실행 (standalone, ::embed 용)
  ────────────────────────────────────────────────────────────
  좌: 편집 가능한 ABAP 코드 에디터(code-copy-block 양식) + ▶ 실행(F8)
  우: SAP 클래식 리스트 화면 — WRITE 문을 파싱해 결과를 그린다.
  · 같은 줄 이어붙기(/ 없음) / 줄바꿈(/) / 콜론(:) 체인을 직접 체험.
  · 따옴표 짝 안 맞음·마침표 누락 등 흔한 실수를 친절히 안내.
  · 예제 칩으로 4가지 출력 패턴을 즉시 불러와 비교.
  · 부모(레슨)에 높이 postMessage → iframe 자동 높이.
  ⚠️ 외부 의존성 없음(순수 JS).
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WRITE 출력 시뮬레이터 · Sample</title>
<style>
:root{
  --bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;
  --brand:#3b5bdb;--accent:#0ca678;--soon:#94a0b8;--warn:#be123c;
  --mono:'D2Coding',Consolas,Monaco,'Courier New',monospace;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;
}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:transparent;line-height:1.5;}
.wrap{padding:14px;}
.hd{font-weight:800;font-size:1rem;margin:0 0 4px;}
.hd small{font-weight:600;color:var(--brand);}
.lead{margin:0 0 12px;color:var(--ink-soft);font-size:.86rem;}
.lead code{font-family:var(--mono);background:#eef2ff;color:var(--brand);padding:1px 5px;border-radius:5px;font-size:.92em;}

/* 예제 칩 */
.presets{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:12px;}
.presets__lbl{font-size:.8rem;font-weight:700;color:var(--ink-soft);margin-right:2px;}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:999px;
  padding:6px 13px;font:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--brand);color:var(--brand);}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 4px 12px rgba(59,91,219,.25);}

/* 분할 — 양 패널 높이 맞춤 */
.split{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch;}
.pane{border:1px solid var(--line);border-radius:13px;background:var(--surface);overflow:hidden;display:flex;flex-direction:column;min-width:0;min-height:198px;}

/* 코드 에디터 */
.ed__hd{background:#2c3666;border-bottom:2px solid var(--brand);padding:8px 12px;height:42px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ed__dots{display:flex;gap:6px;} .ed__dots i{width:11px;height:11px;border-radius:50%;display:inline-block;}
.ed__dots .r{background:#ff5f56;} .ed__dots .y{background:#ffbd2e;} .ed__dots .g{background:#27c93f;}
.ed__lang{margin-left:2px;color:#ffa03b;font-weight:bold;font-size:11px;letter-spacing:1px;}
.ed__title{margin-left:4px;color:#e7ebff;font-weight:600;font-size:11.5px;letter-spacing:.5px;}
.run-btn{margin-left:auto;background:var(--accent);border:0;border-radius:6px;
  padding:5px 13px;font-size:11.5px;cursor:pointer;color:#fff;font-weight:800;font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:5px;}
.run-btn:hover{filter:brightness(1.08);} .run-btn:active{transform:translateY(1px);}
.run-btn kbd{background:rgba(255,255,255,.22);border-radius:4px;padding:0 5px;font-size:10px;font-family:var(--mono);}
.code-wrap{flex:1;display:flex;align-items:stretch;overflow:hidden;background:#f6f8fa;min-height:170px;}
.gutter{margin:0;padding:12px 8px;background:#eef1f8;color:#aab3cf;text-align:right;border-right:1px solid #e3e7f2;user-select:none;font-family:var(--mono);font-size:13px;line-height:1.7;min-width:34px;white-space:pre;overflow:hidden;}
.code{flex:1;width:100%;border:0;outline:0;resize:none;background:#f6f8fa;color:#24324a;
  font-family:var(--mono);font-size:13px;line-height:1.7;padding:12px 14px;tab-size:2;min-height:170px;overflow-x:auto;}
.code:focus{box-shadow:inset 0 0 0 2px rgba(59,91,219,.25);}

/* SAP 리스트 출력 */
.out__hd{display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,#3b5bdb,#0ca678);
  color:#fff;padding:8px 12px;height:42px;font-size:.78rem;font-weight:800;flex-shrink:0;letter-spacing:.02em;}
.out__hd .sq{width:11px;height:11px;border-radius:2px;background:rgba(255,255,255,.85);}
.screen{flex:1;background:#fff;padding:12px 14px;font-family:var(--mono);font-size:13px;line-height:1.7;color:#1c2233;
  overflow:auto;white-space:pre;}
.screen .ph{color:var(--soon);font-style:italic;white-space:normal;font-family:var(--font);}
.screen .row{display:block;min-height:1.7em;}
.screen .row:hover{background:#eef2ff;}
.screen .rownum{display:inline-block;width:2.2em;color:#c2cad8;user-select:none;text-align:right;margin-right:1em;}
.screen.err{color:var(--warn);white-space:normal;font-family:var(--font);font-weight:600;}

/* 상태/노트 */
.status{margin-top:10px;font-size:.82rem;font-weight:700;min-height:1.2em;}
.status.ok{color:var(--accent);} .status.bad{color:var(--warn);}
.note{margin-top:8px;border-left:3px solid var(--brand);background:rgba(59,91,219,.06);border-radius:0 9px 9px 0;padding:9px 13px;font-size:.83rem;color:#2a3550;}
.note code{font-family:var(--mono);background:#fff;border:1px solid var(--line);padding:0 5px;border-radius:4px;}

@media(max-width:760px){ .split{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="wrap">
  <p class="hd">WRITE 출력 시뮬레이터 <small>(직접 고쳐 실행)</small></p>
  <p class="lead">코드를 마음대로 고치고 <b>▶ 실행(F8)</b>을 누르면, SAP 리스트 화면에 결과가 그려집니다. <code>/</code>를 넣고 빼며 <b>줄바꿈이 어떻게 달라지는지</b> 직접 확인해 보세요.</p>

  <div class="presets" id="presets">
    <span class="presets__lbl">예제:</span>
    <button class="chip" type="button" data-ex="0">한 줄 출력</button>
    <button class="chip" type="button" data-ex="1">이어 붙기 (/ 없음)</button>
    <button class="chip" type="button" data-ex="2">줄바꿈 (/)</button>
    <button class="chip" type="button" data-ex="3">콜론(:) 체인</button>
  </div>

  <div class="split">
    <div class="pane">
      <div class="ed__hd">
        <span class="ed__dots"><i class="r"></i><i class="y"></i><i class="g"></i></span>
        <span class="ed__lang">ABAP</span>
        <span class="ed__title">ZHELLO</span>
        <button class="run-btn" id="run" type="button">▶ 실행 <kbd>F8</kbd></button>
      </div>
      <div class="code-wrap"><pre class="gutter" id="gutter">1</pre><textarea class="code" id="code" spellcheck="false" wrap="off"></textarea></div>
    </div>
    <div class="pane">
      <div class="out__hd"><span class="sq"></span>리스트 &nbsp;—&nbsp; 실행 결과</div>
      <div class="screen" id="screen"></div>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="note" id="note"><b>규칙 3가지</b> — 같은 줄에 이어 쓰기 = <code>/</code> 없음 · 줄바꿈 = <code>/</code> · 여러 값 한 번에 = <code>WRITE:</code> 뒤 콤마(<code>,</code>)로 나열.</div>
</div>

<script>
(function(){
  var EXAMPLES = [
    "REPORT zhello.\n\nWRITE 'Hello, ABAP!'.",
    "REPORT zhello.\n\n* / 가 없으면 같은 줄에 이어 붙는다\nWRITE 'first'.\nWRITE 'second'.\nWRITE 'third'.",
    "REPORT zhello.\n\n* / 를 붙이면 새 줄로 내려간다\nWRITE 'first line'.\nWRITE / 'second line'.\nWRITE / 'third line'.",
    "REPORT zhello.\n\n* WRITE: 뒤 콤마로 여러 값을 한 번에\nWRITE: / 'A', 'B', 'C',\n       / 'D', 'E'."
  ];
  var ta = document.getElementById('code'),
      screenEl = document.getElementById('screen'),
      statusEl = document.getElementById('status'),
      presetsEl = document.getElementById('presets'),
      gutterEl = document.getElementById('gutter');

  /* 행번호(거터) — 편집 내용과 1:1 동기화 + 스크롤 동기화 */
  function updateGutter(){
    var n = ta.value.split('\n').length, s='';
    for(var i=1;i<=n;i++){ s += (i>1?'\n':'') + i; }
    gutterEl.textContent = s;
  }
  ta.addEventListener('input', updateGutter);
  ta.addEventListener('scroll', function(){ gutterEl.scrollTop = ta.scrollTop; });

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  /* 주석 제거: 줄 전체 * 주석, 인라인 " 주석(문자열 밖) */
  function stripComments(text){
    return text.split('\n').map(function(line){
      if(/^\s*\*/.test(line)) return '';
      var out='', inStr=false;
      for(var i=0;i<line.length;i++){
        var c=line[i];
        if(c==="'"){ inStr=!inStr; out+=c; continue; }
        if(c==='"' && !inStr) break;   // 인라인 주석 시작
        out+=c;
      }
      return out;
    }).join('\n');
  }
  /* 마침표(.)로 문장 분리 — 문자열 안의 . 은 무시 */
  function splitStatements(text){
    var stmts=[], cur='', inStr=false, leftover='';
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(c==="'"){ inStr=!inStr; cur+=c; continue; }
      if(c==='.' && !inStr){ stmts.push(cur); cur=''; continue; }
      cur+=c;
    }
    if(cur.trim()) leftover=cur.trim();      // 마침표 없이 남은 꼬리
    return {stmts:stmts, leftover:leftover, open:inStr};
  }
  /* 콤마로 피연산자 분리 — 문자열 안의 , 은 무시 */
  function splitByComma(text){
    var ops=[], cur='', inStr=false;
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(c==="'"){ inStr=!inStr; cur+=c; continue; }
      if(c===',' && !inStr){ ops.push(cur); cur=''; continue; }
      cur+=c;
    }
    if(cur.trim()!=='') ops.push(cur);
    return ops;
  }

  function run(){
    var raw = ta.value;
    var text = stripComments(raw);
    var parsed = splitStatements(text);

    if(parsed.open){               // 따옴표 짝 안 맞음
      return showError("따옴표(')의 짝이 맞지 않아요. 문자열을 열었으면 같은 줄에서 닫아 주세요.");
    }

    var lines=[''], hasOut=false, wrote=false, usedVar=false;
    function nl(){ if(hasOut) lines.push(''); }   // 출력 전 맨 처음 / 는 빈 줄을 만들지 않음

    parsed.stmts.forEach(function(stmt){
      var s = stmt.trim();
      if(s==='') return;
      if(!/^write\b/i.test(s)) return;            // WRITE 문만 출력 (REPORT·DATA 등은 무시)
      wrote = true;
      var rest = s.replace(/^\s*write\s*:?\s*/i,'');
      splitByComma(rest).forEach(function(op){
        var o = op.trim(), newline=false;
        if(o.charAt(0)==='/'){ newline=true; o=o.slice(1).trim(); }
        if(newline) nl();
        if(o===''){ return; }                     // 슬래시만 — 줄바꿈만
        var txt, m=o.match(/^'([\s\S]*)'$/);
        if(m){ txt=m[1]; }                         // 문자 리터럴
        else { txt=o; usedVar=true; }              // 리터럴 아님(변수/숫자 등)
        var idx=lines.length-1;
        lines[idx] = lines[idx]==='' ? txt : lines[idx]+' '+txt;
        hasOut=true;
      });
    });

    if(parsed.leftover && /^write\b/i.test(parsed.leftover)){
      return showError("마지막 WRITE 문에 마침표(.)가 없어요. 모든 문장은 ' . '으로 끝나야 합니다.");
    }
    if(!wrote){
      return showPlain('<span class="ph">출력할 WRITE 문이 없어요. 예를 들어 <b>WRITE \'Hello\'.</b> 를 적어 보세요.</span>',
        'bad', '출력할 WRITE 문이 없습니다.');
    }

    var html='';
    lines.forEach(function(ln,i){
      html += '<span class="row"><span class="rownum">'+(i+1)+'</span>'+(ln===''?' ':esc(ln))+'</span>';
    });
    screenEl.className='screen'; screenEl.innerHTML=html;
    var msg='✓ '+lines.length+'줄 출력';
    if(usedVar) msg+='  ·  ⚠ 따옴표 없는 값은 변수예요 — 변수는 CH02에서 배웁니다(지금은 글자 그대로 표시).';
    setStatus(msg, usedVar?'bad':'ok');
    postHeight();
  }
  function showError(text){
    screenEl.className='screen err'; screenEl.textContent='⚠ '+text;
    setStatus('⚠ '+text, 'bad'); postHeight();
  }
  function showPlain(html, cls, status){
    screenEl.className='screen'; screenEl.innerHTML=html; setStatus(status, cls); postHeight();
  }
  function setStatus(t, cls){ statusEl.className='status '+(cls||''); statusEl.textContent=t; }

  /* 예제 로드 */
  function loadEx(i){
    ta.value=EXAMPLES[i];
    updateGutter();
    presetsEl.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('on', +c.dataset.ex===i); });
    run();
  }
  presetsEl.addEventListener('click', function(e){
    var c=e.target.closest('.chip'); if(!c) return; loadEx(+c.dataset.ex);
  });
  document.getElementById('run').addEventListener('click', function(){
    presetsEl.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('on'); });
    run();
  });
  ta.addEventListener('keydown', function(e){
    if(e.key==='F8' || (e.key==='Enter' && (e.ctrlKey||e.metaKey))){ e.preventDefault(); run(); }
  });

  /* 부모에 높이 전송(iframe 자동 높이) */
  function postHeight(){
    try{ var el=document.querySelector('.wrap');
      var h=Math.ceil(el ? el.getBoundingClientRect().height : document.body.scrollHeight)+6;
      parent.postMessage({sda:'embed-height', h:h}, '*'); }catch(e){}
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);

  loadEx(0);   // 첫 예제 + 즉시 실행
})();
</script>
</body>
</html>
