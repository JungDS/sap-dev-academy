<!DOCTYPE html>
<!-- 규칙(코드 예제 공통): 소스는 수직 스크롤만 허용하고 수평 스크롤은 지양한다 → 한 줄을 짧게 유지(긴 문장은 여러 줄로 분할). 이 롱 샘플도 한 줄에 몰아쓰지 않고 문장별로 분할(33줄)해 가로 스크롤이 생기지 않게 함. -->

<!--
  스텝 디버거 (Step Debugger) — standalone · 확정 디자인(A안 → .abap-editor 네이비로 통일)
  ────────────────────────────────────────────────────────────
  "다음"을 누를 때마다 한 줄씩 실행하며 변수·콘솔이 갱신되는 가상 디버거.
   · 강조(앰버 ▶)된 줄 = '실행할 차례'(아직 실행 전) / done(초록 ✓) = 방금 실행한 줄
   · 콘솔 [현재 행]/[전체 출력] 토글
   · ABAP 구문 강조(키워드/문자열/주석/숫자) — 실제 에디터 느낌
  단계 정의는 .stepper-config 의 JSON(code/vars/steps). 외부 의존성 없음.
  재사용 시: ".dbg*"/".code*"/".var*"/".tok-*" CSS + 하단 엔진(highlightAbap+initStepper)만.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>스텝 디버거 (롱 소스 20줄+) · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--amber:#d98a0b;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;--mono:'D2Coding',Consolas,Monaco,monospace;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.6;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:920px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 18px;}
.fixes{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px;}
.fixes span{font-size:.78rem;font-weight:700;color:#0b7250;background:#eafaf3;border:1px solid #bfead7;border-radius:999px;padding:4px 11px;}

/* 버튼 · 프로그레스 */
.btn{border:1px solid transparent;border-radius:9px;padding:8px 15px;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;}
.btn--primary{background:var(--brand);color:#fff;} .btn--primary:hover{background:#2f4bc0;}
.btn--step{background:#eef1f6;color:#7a8699;border-color:var(--line);}
.btn--step:not(:disabled){background:var(--amber);color:#fff;border-color:#b8770a;}
.btn--step:not(:disabled):hover{background:#bd770a;}
.btn--step:disabled{opacity:.5;cursor:not-allowed;}
.muted{color:var(--ink-soft);font-size:.82rem;font-weight:700;}
.progress{height:6px;border-radius:999px;background:#e7ebf3;overflow:hidden;flex:1;min-width:60px;}
.progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--accent));transition:width .35s cubic-bezier(.16,1,.3,1);}

/* 코드 (라인넘버 = CSS counter) + ABAP 토큰 색 */
.code{counter-reset:ln;list-style:none;margin:0;padding:8px 0;font-family:var(--mono);font-size:13px;line-height:1.75;}
.code li{counter-increment:ln;display:grid;grid-template-columns:40px 1fr;}
.code li::before{content:counter(ln);text-align:right;padding-right:12px;color:#aab3cf;user-select:none;}
.code li code{padding:0 14px;white-space:pre;color:#24292f;}
.code li.active{background:#fff7d6;box-shadow:inset 3px 0 0 var(--amber);}
.code li.active::before{color:#b8770a;background:#fbeec4;font-weight:700;}
.code li.active code{font-weight:700;}
.code li.done{background:#eef9f3;box-shadow:inset 3px 0 0 var(--accent);}
.code li.done::before{color:#0b7250;background:#dcf3e8;}
/* ABAP 구문 강조 */
.tok-kw{color:#005cc5;font-weight:700;}
.tok-str{color:#22863a;}
.tok-num{color:#22863a;}
.tok-com{color:#9aa0ad;font-style:italic;}

/* 변수 */
.var__name{display:flex;flex-direction:column;}
.var__label{font-weight:700;color:var(--ink);}
.var__sub{font-size:.72rem;color:var(--ink-soft);}
.var__val{font-family:var(--mono);font-weight:800;color:var(--brand);padding:1px 5px;border-radius:5px;}
@keyframes valflash{0%{background:#fff0b8;}100%{background:transparent;}}
.var__val.changed{animation:valflash .8s ease;}

/* 콘솔 모드 토글 + 범례 */
.console-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cmode{display:inline-flex;gap:2px;background:#e9edf4;border-radius:7px;padding:2px;}
.cmode__b{border:0;background:none;border-radius:5px;padding:4px 10px;font:inherit;font-size:.72rem;font-weight:700;color:var(--ink-soft);cursor:pointer;}
.cmode__b.on{background:#fff;color:var(--brand);box-shadow:0 1px 2px rgba(20,28,51,.12);}
.leg{font-size:.68rem;font-weight:600;color:var(--ink-soft);}
.leg .a{color:#b8770a;} .leg .d{color:#0b7250;}

/* 라이트 IDE 레이아웃 (A안) */
.dbg{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.dbg__bar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);background:#fbfcfe;}
.dbg__main{display:grid;grid-template-columns:1.5fr 1fr;}
.dbg__editorwrap{display:flex;flex-direction:column;border-right:1px solid var(--line);min-width:0;}
.dbg__edhd{background:#2c3666;border-bottom:2px solid var(--brand);padding:8px 12px;display:flex;align-items:center;gap:8px;}
.dbg__edhd .cb-dots{display:flex;gap:5px;} .dbg__edhd .cb-dots i{width:10px;height:10px;border-radius:50%;display:block;}
.dbg__edhd .cb-dots i:nth-child(1){background:#ff5f56;} .dbg__edhd .cb-dots i:nth-child(2){background:#ffbd2e;} .dbg__edhd .cb-dots i:nth-child(3){background:#27c93f;}
.dbg__edhd .cb-lang{color:#ffa03b;font-weight:bold;letter-spacing:1px;font-size:11px;}
.dbg__editor{background:#fbfcfe;max-height:300px;overflow:auto;}
.dbg__watch{display:flex;flex-direction:column;min-width:0;}
.watch__head{padding:10px 14px;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);border-bottom:1px solid var(--line);}
.watch__head svg{width:14px;height:14px;vertical-align:-2px;margin-right:5px;}
.watch__list{overflow:auto;max-height:258px;}
.dbg .var{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-bottom:1px solid #eef1f6;}
.dbg__console{border-top:1px solid var(--line);}
.console__head{padding:9px 14px;font-size:.74rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);background:#f4f6fa;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.console__head .sp{flex:1;}
.console__body{margin:0;padding:14px;font-family:var(--mono);font-size:.82rem;color:#27425c;background:#f8fafc;min-height:74px;white-space:pre-wrap;}
@media(max-width:680px){ .dbg__main{grid-template-columns:1fr;} .dbg__editor{border-right:none;border-bottom:1px solid var(--line);} }
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Code Learning · 스텝 디버거 (롱 소스)</p>
    <h1>한 줄씩 실행하며 변수 변화 보기 — 긴 소스 버전</h1>
    <p class="lead">SE38 디버거처럼 "다음"을 누를 때마다 실행 위치가 이동하고 변수·콘솔이 갱신됩니다. <strong>강조된 줄은 "실행할 차례"(아직 실행 전)</strong>이고, 방금 실행한 줄은 초록(✓)으로 표시됩니다.</p>
    <div class="fixes"><span>✓ ABAP 구문 강조</span><span>✓ 강조=실행 직전 의미</span><span>✓ 콘솔 현재 행/전체 출력 토글</span></div>

    <div class="dbg" data-stepper>
      <div class="dbg__bar">
        <button class="btn btn--primary" data-start>▶ 시작</button>
        <button class="btn btn--step" data-next disabled>다음 ⏭</button>
        <div class="progress"><i data-progress></i></div>
        <span class="muted" data-counter>0 / 12</span>
      </div>
      <div class="dbg__main">
        <div class="dbg__editorwrap"><div class="dbg__edhd"><span class="cb-dots"><i></i><i></i><i></i></span><span class="cb-lang">ABAP</span></div><div class="dbg__editor" data-code></div></div>
        <div class="dbg__watch">
          <div class="watch__head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>변수 모니터</div>
          <div class="watch__list" data-vars></div>
        </div>
      </div>
      <div class="dbg__console">
        <div class="console__head">
          <span>콘솔 출력</span>
          <span class="leg"><span class="a">▶ 실행할 차례</span> · <span class="d">✓ 방금 실행</span></span>
          <span class="sp"></span>
          <span class="cmode"><button class="cmode__b on" data-cmode="cur">현재 행</button><button class="cmode__b" data-cmode="all">전체 출력</button></span>
        </div>
        <pre class="console__body" data-console>대기 중 — ▶ 시작을 누르세요.</pre>
      </div>
      <script type="application/json" class="stepper-config">
      {"code":["REPORT zdemo_long.","","TYPES: BEGIN OF ty_emp,","         name TYPE string,","         dept TYPE string,","         sal  TYPE i,","       END OF ty_emp.","DATA: lt_emp TYPE TABLE OF ty_emp,","      ls_emp TYPE ty_emp,","      lv_total TYPE i.","","ls_emp-name = '정훈영'.","ls_emp-dept = 'DEV'.","ls_emp-sal  = 5000.","APPEND ls_emp TO lt_emp.","","ls_emp-name = '손흥민'.","ls_emp-dept = 'SALES'.","ls_emp-sal  = 3200.","APPEND ls_emp TO lt_emp.","","ls_emp-name = '아이유'.","ls_emp-dept = 'DEV'.","ls_emp-sal  = 4100.","APPEND ls_emp TO lt_emp.","","LOOP AT lt_emp INTO ls_emp.","  IF ls_emp-dept = 'DEV'.","    lv_total = lv_total + ls_emp-sal.","  ENDIF.","ENDLOOP.","","WRITE: / 'DEV 합계:', lv_total."],
       "vars":[{"key":"emp","label":"ls_emp","sub":"현재 행(name/dept/sal)","init":"—"},{"key":"total","label":"lv_total","sub":"DEV 합계","init":"0"}],
       "steps":[{"line":15,"vars":{"emp":"정훈영/DEV/5000"},"console":"1행 추가: 정훈영(DEV, 5000)"},{"line":20,"vars":{"emp":"손흥민/SALES/3200"},"console":"2행 추가: 손흥민(SALES, 3200)"},{"line":25,"vars":{"emp":"아이유/DEV/4100"},"console":"3행 추가: 아이유(DEV, 4100)"},{"line":27,"vars":{"emp":"정훈영/DEV/5000"},"console":"LOOP 1회차: ls_emp = 정훈영(DEV)"},{"line":28,"vars":{},"console":"IF dept = 'DEV'? → 참"},{"line":29,"vars":{"total":"5000"},"console":"lv_total = 0 + 5000 = 5000"},{"line":27,"vars":{"emp":"손흥민/SALES/3200"},"console":"LOOP 2회차: ls_emp = 손흥민(SALES)"},{"line":28,"vars":{},"console":"IF dept = 'DEV'? → 거짓 (건너뜀)"},{"line":27,"vars":{"emp":"아이유/DEV/4100"},"console":"LOOP 3회차: ls_emp = 아이유(DEV)"},{"line":28,"vars":{},"console":"IF dept = 'DEV'? → 참"},{"line":29,"vars":{"total":"9100"},"console":"lv_total = 5000 + 4100 = 9100"},{"line":33,"vars":{},"console":"출력: DEV 합계 = 9100"}]}
      </script>
    </div>
  </main>

<script>
// ===== 컴포넌트 JS — ABAP 하이라이터 + 스텝 디버거 엔진 =====
(function(){
  const ABAP_KW = new Set("DATA TYPE TYPES VALUE TABLE OF LIKE LINE BEGIN END REF TO LOOP AT INTO ENDLOOP APPEND WRITE IF ELSE ELSEIF ENDIF SELECT FROM WHERE INNER LEFT OUTER JOIN ON READ WITH KEY SORT BY CLEAR REFRESH MOVE CORRESPONDING FIELDS SINGLE STANDARD SORTED HASHED INSERT DELETE MODIFY DESCRIBE LINES DO ENDDO WHILE ENDWHILE CASE WHEN OTHERS ENDCASE CALL METHOD FUNCTION FORM PERFORM PARAMETERS RANGES CHECK EXIT CONTINUE RETURN ADD SUBTRACT MULTIPLY DIVIDE CONCATENATE SPLIT CONDENSE ASCENDING DESCENDING AND OR NOT IS INITIAL BOUND NEW".split(/\s+/));
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  function highlightAbap(line){
    if(/^\s*\*/.test(line)) return '<span class="tok-com">'+esc(line)+'</span>'; // 전체 줄 주석(*)
    let out=""; const re=/('[^']*'?)|(".*$)|(\b\d+\b)|([A-Za-z_][A-Za-z0-9_]*)|([^A-Za-z0-9_'"]+)/g; let m;
    while((m=re.exec(line))!==null){
      if(m[1]) out+='<span class="tok-str">'+esc(m[1])+'</span>';      // 문자열 '...'
      else if(m[2]) out+='<span class="tok-com">'+esc(m[2])+'</span>'; // 인라인 주석 "...
      else if(m[3]) out+='<span class="tok-num">'+esc(m[3])+'</span>'; // 숫자
      else if(m[4]) out+= ABAP_KW.has(m[4].toUpperCase()) ? '<span class="tok-kw">'+esc(m[4])+'</span>' : esc(m[4]);
      else out+=esc(m[0]);
    }
    return out;
  }

  function initStepper(root){
    let cfg; try{ cfg = JSON.parse(root.querySelector(".stepper-config").textContent); }catch(e){ return; }
    // 코드 렌더(+구문 강조)
    const codeBox = root.querySelector("[data-code]");
    if(codeBox){
      const ol=document.createElement("ol"); ol.className="code";
      cfg.code.forEach((line,i)=>{ const li=document.createElement("li"); li.dataset.line=i+1;
        const code=document.createElement("code"); code.innerHTML=highlightAbap(line); li.appendChild(code); ol.appendChild(li); });
      codeBox.appendChild(ol);
    }
    const varsBox=root.querySelector("[data-vars]");
    if(varsBox) varsBox.innerHTML=cfg.vars.map(v=>`<div class="var"><div class="var__name"><span class="var__label">${v.label}</span><span class="var__sub">${v.sub||""}</span></div><b class="var__val" data-key="${v.key}" data-init="${v.init}">${v.init}</b></div>`).join("");

    const lines=root.querySelectorAll(".code li");
    const consoleEl=root.querySelector("[data-console]"), startBtn=root.querySelector("[data-start]"), nextBtn=root.querySelector("[data-next]");
    const progress=root.querySelector("[data-progress]"), counter=root.querySelector("[data-counter]"), cmodeBtns=root.querySelectorAll("[data-cmode]");
    const steps=cfg.steps;
    let started=false, cur=0, history=[], mode="cur"; // cur = 실행 완료한 줄 수

    function accVars(k){ const v={}; cfg.vars.forEach(d=>v[d.key]=d.init); for(let i=0;i<k;i++) Object.assign(v, steps[i].vars||{}); return v; }
    function curMsg(){
      if(!started) return "대기 중 — ▶ 시작을 누르세요.";
      const next = cur<steps.length ? steps[cur].line : null;
      if(cur===0) return "▶ 준비됨 — '다음 ⏭'을 누르면 "+next+"번 줄을 실행합니다.\n(강조된 줄은 '실행할 차례'이며 아직 실행 전입니다.)";
      const done=steps[cur-1];
      let msg="✓ 방금 "+done.line+"번 줄 실행 → "+(done.console||"");
      msg += (next!=null) ? "\n▶ 다음에 실행할 줄: "+next+"번 (아직 실행 전)" : "\n■ 끝까지 실행 완료";
      return msg;
    }
    function paintConsole(){ if(!consoleEl) return; consoleEl.textContent=(mode==="all")?(history.length?history.join("\n"):"(아직 실행한 줄이 없습니다)"):curMsg(); }
    function render(){
      lines.forEach(l=>l.classList.remove("active","done"));
      const nextLine=(started&&cur<steps.length)?steps[cur].line:null, lastLine=(started&&cur>0)?steps[cur-1].line:null;
      if(lastLine!=null){ const el=root.querySelector('.code li[data-line="'+lastLine+'"]'); if(el) el.classList.add("done"); }
      if(nextLine!=null){ const el=root.querySelector('.code li[data-line="'+nextLine+'"]'); if(el){ el.classList.add("active"); el.scrollIntoView({block:"nearest"}); } }
      const v=accVars(cur), changed=(started&&cur>0)?(steps[cur-1].vars||{}):{};
      cfg.vars.forEach(d=>{ const cell=root.querySelector('.var__val[data-key="'+d.key+'"]'); if(cell){ cell.textContent=v[d.key]; cell.classList.remove("changed"); if(changed[d.key]!==undefined){ void cell.offsetWidth; cell.classList.add("changed"); } } });
      if(progress) progress.style.width=(cur/steps.length*100)+"%";
      if(counter) counter.textContent=cur+" / "+steps.length;
      paintConsole();
    }
    startBtn.addEventListener("click",()=>{ started=true; cur=0; history=[]; startBtn.textContent="↻ 다시"; nextBtn.disabled=false; if(progress) progress.style.transition="width .35s"; render(); });
    nextBtn.addEventListener("click",()=>{ if(!started||cur>=steps.length) return; const s=steps[cur]; history.push((cur+1)+". [line "+s.line+" 실행] "+(s.console||"")); cur++; render(); if(cur>=steps.length) nextBtn.disabled=true; });
    cmodeBtns.forEach(b=>b.addEventListener("click",()=>{ mode=b.dataset.cmode; cmodeBtns.forEach(x=>x.classList.toggle("on",x===b)); paintConsole(); }));
    render();
  }
  document.querySelectorAll("[data-stepper]").forEach(initStepper);
})();
</script>
</body>
</html>
