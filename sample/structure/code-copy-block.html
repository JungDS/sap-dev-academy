<!DOCTYPE html>
<!--
  코드 복사 블록 (ABAP Editor Mockup) — standalone
  ────────────────────────────────────────────────────────────
  네이비 헤더 + 신호등 버튼 + 줄번호 + 구문 토큰 색상 + 클립보드 복사 버튼.
  외부 의존성 없음. 토큰 색은 클래스(.tok-kw/.tok-str/.tok-num/.tok-com)로 직접 칠합니다.
  재사용 시: ".abap-editor*" / ".copy-btn" CSS와 복사 JS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>코드 복사 블록 · Sample</title>
<style>
:root{
  --bg:#f6f7fb; --surface:#fff; --ink:#1c2233; --ink-soft:#5b6478; --line:#e6e8ef;
  --brand:#3b5bdb; --accent:#0ca678; --radius:14px;
  --shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;
  --mono:'D2Coding',Consolas,Monaco,'Courier New',monospace;
}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.6;}
a{color:var(--brand);text-decoration:none;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:880px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;}
.lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — 코드 복사 블록 ===== */
.abap-editor{background:#f6f8fa;border:1px solid #d0d0d0;border-radius:10px;overflow:hidden;margin:18px 0;
  font-family:var(--mono);font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.abap-editor__header{background:#343e6a;padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #232a4a;}
.abap-editor__dots{display:flex;gap:6px;}
.abap-editor__dot{width:12px;height:12px;border-radius:50%;}
.abap-editor__dot.r{background:#ff5f56;} .abap-editor__dot.y{background:#ffbd2e;} .abap-editor__dot.g{background:#27c93f;}
.abap-editor__title{margin-left:6px;color:#ffa03b;font-weight:bold;font-size:12px;letter-spacing:1px;}
.copy-btn{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);border-radius:5px;
  padding:4px 10px;font-size:12px;cursor:pointer;color:#fff;font-weight:bold;font-family:var(--font);transition:all .2s;}
.copy-btn:hover{background:rgba(255,255,255,.24);}
.copy-btn.is-copied{color:#27c93f;border-color:#27c93f;background:rgba(39,201,63,.15);}
.abap-editor__body{display:flex;}
.abap-editor__gutter{background:#f0f0e1;color:#999;padding:12px 8px;text-align:right;border-right:1px solid #d0d0d0;
  user-select:none;min-width:40px;line-height:1.6;}
.abap-editor__code{margin:0;padding:12px 14px;overflow-x:auto;line-height:1.6;color:#333;flex:1;white-space:pre;}
.tok-kw{color:#005cc5;font-weight:700;}
.tok-str{color:#22863a;} .tok-num{color:#22863a;} .tok-com{color:#999;font-style:italic;}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Structure · 코드 복사 블록</p>
    <h1>ABAP 에디터 목업 + 복사 버튼</h1>
    <p class="lead">SE38 에디터 분위기의 코드 박스. 우상단 버튼으로 클립보드에 복사되고, 줄번호와 토큰 색상으로 가독성을 높입니다.</p>

    <div class="abap-editor">
      <div class="abap-editor__header">
        <span class="abap-editor__dots"><i class="abap-editor__dot r"></i><i class="abap-editor__dot y"></i><i class="abap-editor__dot g"></i></span>
        <span class="abap-editor__title">ZDEMO_REPORT</span>
        <button class="copy-btn" type="button">⧉ 복사</button>
      </div>
      <div class="abap-editor__body">
        <pre class="abap-editor__gutter">1
2
3
4
5
6</pre>
<pre class="abap-editor__code"><code><span class="tok-com">* 사번으로 사원명 조회</span>
<span class="tok-kw">DATA</span> lv_name <span class="tok-kw">TYPE</span> string.
<span class="tok-kw">SELECT SINGLE</span> name1 <span class="tok-kw">FROM</span> pa0001
  <span class="tok-kw">INTO</span> lv_name
  <span class="tok-kw">WHERE</span> pernr = <span class="tok-str">'00001234'</span>.
<span class="tok-kw">WRITE</span>: / lv_name.</code></pre>
      </div>
    </div>
  </main>

<script>
// ===== 컴포넌트 JS — 복사 버튼 =====
document.querySelectorAll(".copy-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const code = btn.closest(".abap-editor").querySelector(".abap-editor__code");
    const text = code.innerText;
    const done = ()=>{
      const orig = btn.dataset.orig || btn.textContent;
      btn.dataset.orig = orig;
      btn.textContent = "✓ 복사됨";
      btn.classList.add("is-copied");
      setTimeout(()=>{ btn.textContent = orig; btn.classList.remove("is-copied"); }, 1800);
    };
    if(navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(done).catch(done);
    else done();
  });
});
</script>
</body>
</html>
