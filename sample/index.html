const catalog = document.getElementById("catalog");
function makeCard(s){
  const a = document.createElement("a");
  a.className = "card" + (s.draft ? " card--draft" : "") + (s.review ? " card--review" : "");
  a.href = s.file;
  const tags = (s.tags||[]).map(t=>`<span class="chip">${t}</span>`).join("");
  const dep = s.dep ? `<span class="chip dep">CDN: ${s.dep}</span>` : "";
  const flag = s.draft ? `<span class="chip draft">🚫 ${s.draft}</span>`
             : s.review ? `<span class="chip review">🆕 ${s.review}</span>` : "";
  a.innerHTML = `<span class="card__icon">${s.icon}</span><h3>${s.title}</h3>
    <p>${s.desc}</p><div class="card__meta">${flag}${tags}${dep}</div>`;
  return a;
}
function makeSection(cls, icon, title, desc, items){
  const sec = document.createElement("section");
  sec.className = cls;
  sec.innerHTML = `<div class="cat__head"><span style="font-size:1.3rem">${icon}</span>
    <h2 class="cat__title">${title}</h2><span class="cat__desc">${desc}</span></div>`;
  const grid = document.createElement("div"); grid.className = "grid";
  items.forEach(s=>grid.appendChild(makeCard(s)));
  sec.appendChild(grid); catalog.appendChild(sec);
}
// 1) 정상(production) 카테고리 — 검토/사용금지 제외
CATEGORIES.forEach(c=>{
  const items = SAMPLES.filter(s=>s.cat===c.id && !s.draft && !s.review);
  if(items.length) makeSection("cat", c.icon, c.title, c.desc, items);
});
// 2) 레슨 셸 디자인 후보 (검토·선택) — review 모음
const reviews = SAMPLES.filter(s=>s.review);
if(reviews.length) makeSection("cat cat--review", "🆕", "레슨 셸 디자인 후보 (검토·선택)",
  "이 중 하나를 골라 확정합니다. 들어가서 비교해 보세요. (선택되면 확정본만 위 카테고리에 남깁니다.)", reviews);
// 3) 시안·초안 (사용금지) — draft 모음
const drafts = SAMPLES.filter(s=>s.draft);
if(drafts.length) makeSection("cat cat--draft", "🚫", "시안 · 초안 (사용금지)",
  "폐기된 디자인/비교용 초안 — 실제 콘텐츠엔 쓰지 마세요.", drafts);

const prod = SAMPLES.length - drafts.length - reviews.length;
document.getElementById("count").textContent = `총 ${prod}개 · 후보 ${reviews.length}개(검토) · 사용금지 ${drafts.length}개`;
</script>
</body>
</html>
