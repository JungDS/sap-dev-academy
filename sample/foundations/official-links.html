<!DOCTYPE html>
<!--
  공식 링크 섹션 (Official Links) — standalone
  ────────────────────────────────────────────────────────────
  레슨 주제와 연결된 SAP 공식 문서로 안내하는 링크 리스트.
  제목 + 한 줄 설명 + 출처 배지. 순수 CSS, JS 없음.
  재사용 시 ".link-list" CSS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공식 링크 섹션 · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
a{color:var(--brand);text-decoration:none;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:760px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — 링크 리스트 ===== */
.link-list{display:grid;gap:10px;}
.link-list a{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;box-shadow:var(--shadow);transition:border-color .12s,transform .12s;}
.link-list a:hover{border-color:var(--brand);transform:translateX(2px);text-decoration:none;}
.link-list .ico{font-size:1.4rem;flex-shrink:0;}
.link-list .meta{min-width:0;flex:1;}
.link-list .meta strong{display:block;color:var(--ink);}
.link-list .meta span{color:var(--ink-soft);font-size:.9rem;}
.link-list .src{font-size:.7rem;font-weight:700;color:#0b7250;background:#eafaf3;border:1px solid #bfe3d4;border-radius:999px;padding:3px 9px;white-space:nowrap;}
.link-list .arrow{color:var(--brand);font-weight:800;}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Foundations · 공식 링크</p>
    <h1>더 깊이 보고 싶다면 (공식 문서)</h1>
    <p class="lead">레슨에서 다룬 개념의 1차 출처로 연결합니다. 학습 후 원문으로 확인하는 습관을 만듭니다.</p>

    <div class="link-list">
      <a href="https://help.sap.com/docs/ABAP_PLATFORM_NEW" target="_blank" rel="noopener">
        <span class="ico">📘</span>
        <span class="meta"><strong>ABAP Keyword Documentation</strong><span>모든 ABAP 구문의 1차 레퍼런스</span></span>
        <span class="src">help.sap.com</span><span class="arrow">↗</span>
      </a>
      <a href="https://community.sap.com/topics/abap" target="_blank" rel="noopener">
        <span class="ico">💬</span>
        <span class="meta"><strong>SAP Community — ABAP</strong><span>실무 Q&A·블로그·튜토리얼</span></span>
        <span class="src">community.sap.com</span><span class="arrow">↗</span>
      </a>
      <a href="https://developers.sap.com/tutorial-navigator.html" target="_blank" rel="noopener">
        <span class="ico">🧪</span>
        <span class="meta"><strong>SAP Tutorial Navigator</strong><span>단계별 실습 튜토리얼 모음</span></span>
        <span class="src">developers.sap.com</span><span class="arrow">↗</span>
      </a>
    </div>
  </main>
</body>
</html>
