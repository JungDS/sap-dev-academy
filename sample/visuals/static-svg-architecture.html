<!DOCTYPE html>
<!--
  정적 SVG 아키텍처 다이어그램 (Static SVG Architecture) — standalone
  ────────────────────────────────────────────────────────────
  인라인 SVG로 Full-Stack(ABAP → Gateway/OData → UI5) 구조를 그림.
  외부 이미지/라이브러리 없음(SVG 직접 작성). 텍스트도 SVG <text>라 선명.
  재사용 시 SVG 블록 + 최소 CSS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SVG 아키텍처 · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:880px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — SVG 아키텍처 ===== */
.svg-card{background:#f7fbff;border:1px solid #d9e6f5;border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.svg-card svg{width:100%;height:auto;display:block;}
.svg-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:.85rem;color:var(--ink-soft);}
.svg-legend span{display:flex;align-items:center;gap:6px;}
.svg-legend i{width:12px;height:12px;border-radius:3px;display:inline-block;}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Visuals · SVG 아키텍처</p>
    <h1>ABAP → Gateway → UI5 풀스택 구조</h1>
    <p class="lead">백엔드 로직이 OData 서비스로 노출되고, UI5 화면이 그것을 소비하는 전체 흐름을 한 장의 SVG로. 라이브러리 없이 선명하게 렌더됩니다.</p>

    <div class="svg-card">
      <svg viewBox="0 0 760 280" role="img" aria-label="Full-stack 아키텍처 다이어그램">
        <defs>
          <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#3b5bdb"/>
          </marker>
        </defs>
        <!-- Backend -->
        <rect x="20" y="60" width="200" height="160" rx="14" fill="#fff" stroke="#3b5bdb" stroke-width="2"/>
        <text x="120" y="48" text-anchor="middle" font-size="14" font-weight="800" fill="#26336b">ABAP Backend</text>
        <rect x="40" y="84" width="160" height="38" rx="8" fill="#eef2ff"/>
        <text x="120" y="108" text-anchor="middle" font-size="13" fill="#1c2233">Internal Table · Open SQL</text>
        <rect x="40" y="132" width="160" height="38" rx="8" fill="#eef2ff"/>
        <text x="120" y="156" text-anchor="middle" font-size="13" fill="#1c2233">Business Logic (Class)</text>
        <rect x="40" y="180" width="160" height="28" rx="8" fill="#eef2ff"/>
        <text x="120" y="199" text-anchor="middle" font-size="12" fill="#1c2233">DB (CDS View)</text>

        <!-- Gateway -->
        <rect x="290" y="90" width="180" height="100" rx="14" fill="#fff" stroke="#0ca678" stroke-width="2"/>
        <text x="380" y="78" text-anchor="middle" font-size="14" font-weight="800" fill="#0b7250">Gateway</text>
        <text x="380" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2233">OData Service</text>
        <text x="380" y="154" text-anchor="middle" font-size="11" fill="#5b6478">/sap/opu/odata/...</text>

        <!-- Frontend -->
        <rect x="540" y="60" width="200" height="160" rx="14" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
        <text x="640" y="48" text-anchor="middle" font-size="14" font-weight="800" fill="#4c1d95">UI5 / Fiori</text>
        <rect x="560" y="84" width="160" height="38" rx="8" fill="#f3eefe"/>
        <text x="640" y="108" text-anchor="middle" font-size="13" fill="#1c2233">XML View</text>
        <rect x="560" y="132" width="160" height="38" rx="8" fill="#f3eefe"/>
        <text x="640" y="156" text-anchor="middle" font-size="13" fill="#1c2233">Controller (JS)</text>
        <rect x="560" y="180" width="160" height="28" rx="8" fill="#f3eefe"/>
        <text x="640" y="199" text-anchor="middle" font-size="12" fill="#1c2233">OData Model</text>

        <!-- Arrows -->
        <line x1="222" y1="140" x2="286" y2="140" stroke="#3b5bdb" stroke-width="2.5" marker-end="url(#arr)"/>
        <line x1="472" y1="140" x2="536" y2="140" stroke="#3b5bdb" stroke-width="2.5" marker-end="url(#arr)"/>
        <text x="254" y="130" text-anchor="middle" font-size="11" fill="#5b6478">expose</text>
        <text x="504" y="130" text-anchor="middle" font-size="11" fill="#5b6478">HTTP/JSON</text>
      </svg>
      <div class="svg-legend">
        <span><i style="background:#3b5bdb"></i> 백엔드(ABAP)</span>
        <span><i style="background:#0ca678"></i> 통합(Gateway/OData)</span>
        <span><i style="background:#6d28d9"></i> 프론트(UI5)</span>
      </div>
    </div>
  </main>
</body>
</html>
