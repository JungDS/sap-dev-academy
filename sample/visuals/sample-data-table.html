<!DOCTYPE html>
<!--
  샘플 데이터 테이블 (Interactive Data Table) — standalone
  ────────────────────────────────────────────────────────────
  ALV 스타일 표. 행을 클릭하면 "현재 행"(sy-tabix 포인터)으로 강조되고
  하단에 선택 행 정보가 표시됨. 정렬 가능한 헤더도 포함.
  외부 의존성 없음. 재사용 시 ".dtable*" CSS + 하단 JS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>샘플 데이터 테이블 · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--th-bg:#d7e0f5;--th-ink:#26336b;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;--mono:'D2Coding',Consolas,Monaco,monospace;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:820px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — 데이터 테이블 ===== */
.dtable-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.dtable{width:100%;border-collapse:collapse;font-size:.92rem;}
.dtable th,.dtable td{padding:10px 14px;text-align:left;border-bottom:1px solid #eef1f7;}
.dtable thead th{background:var(--th-bg);color:var(--th-ink);font-weight:800;cursor:pointer;user-select:none;white-space:nowrap;}
.dtable thead th:hover{background:#e2e9ff;}
.dtable thead th .sort{color:#b6c0d8;font-size:.8em;margin-left:4px;}
.dtable tbody tr{cursor:pointer;transition:background .12s;}
.dtable tbody tr:hover{background:#f6f9ff;}
.dtable tbody tr.current{background:#eafaf3;box-shadow:inset 4px 0 0 var(--accent);}
.dtable td.num{font-family:var(--mono);text-align:right;}
.dtable__readout{padding:12px 16px;background:#f8fafc;border-top:1px solid var(--line);font-size:.9rem;color:#334155;}
.dtable__readout b{color:var(--brand);font-family:var(--mono);}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Visuals · 데이터 테이블</p>
    <h1>ALV 스타일 결과 테이블</h1>
    <p class="lead">행을 클릭하면 "현재 행"(sy-tabix 포인터)으로 강조되고, 아래에 선택 정보가 나타납니다. 헤더를 클릭하면 정렬됩니다.</p>

    <div class="dtable-card" data-dtable>
      <table class="dtable">
        <thead><tr>
          <th data-key="pernr">PERNR<span class="sort">↕</span></th>
          <th data-key="name1">NAME1<span class="sort">↕</span></th>
          <th data-key="werks">WERKS<span class="sort">↕</span></th>
          <th data-key="sal" data-num>SALARY<span class="sort">↕</span></th>
        </tr></thead>
        <tbody>
          <tr><td>0001</td><td>정훈영</td><td>1000</td><td class="num">5000</td></tr>
          <tr><td>0002</td><td>손흥민</td><td>1000</td><td class="num">3200</td></tr>
          <tr><td>0003</td><td>유재석</td><td>2000</td><td class="num">4100</td></tr>
          <tr><td>0004</td><td>김연아</td><td>2000</td><td class="num">2800</td></tr>
        </tbody>
      </table>
      <div class="dtable__readout">행을 클릭해 보세요. <span class="rd">선택된 행이 없습니다.</span></div>
    </div>
  </main>

<script>
// ===== 컴포넌트 JS — 데이터 테이블 (현재 행 + 정렬) =====
(function(){
  document.querySelectorAll("[data-dtable]").forEach(card=>{
    const tbody=card.querySelector("tbody");
    const rd=card.querySelector(".rd");
    // 현재 행 강조
    tbody.addEventListener("click",e=>{
      const tr=e.target.closest("tr"); if(!tr) return;
      tbody.querySelectorAll("tr").forEach(r=>r.classList.remove("current"));
      tr.classList.add("current");
      const cells=[...tr.children].map(td=>td.textContent);
      const idx=[...tbody.children].indexOf(tr)+1;
      rd.innerHTML=`현재 행 <b>sy-tabix = ${idx}</b> · PERNR=<b>${cells[0]}</b> · NAME1=<b>${cells[1]}</b> · SALARY=<b>${cells[3]}</b>`;
    });
    // 헤더 정렬
    const ths=card.querySelectorAll("thead th");
    ths.forEach((th,col)=>{
      let asc=true;
      th.addEventListener("click",()=>{
        const num=th.hasAttribute("data-num");
        const rows=[...tbody.querySelectorAll("tr")];
        rows.sort((a,b)=>{
          let x=a.children[col].textContent, y=b.children[col].textContent;
          if(num){ x=+x; y=+y; return asc?x-y:y-x; }
          return asc? x.localeCompare(y,'ko') : y.localeCompare(x,'ko');
        });
        rows.forEach(r=>tbody.appendChild(r));
        asc=!asc;
        ths.forEach(t=>t.querySelector(".sort").textContent="↕");
        th.querySelector(".sort").textContent=asc?"↓":"↑";
      });
    });
  });
})();
</script>
</body>
</html>
