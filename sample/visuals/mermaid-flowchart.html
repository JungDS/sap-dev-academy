<!DOCTYPE html>
<!--
  Mermaid 흐름도 (Mermaid Flowchart) — standalone · 배지 카드 디자인 확정본
  ────────────────────────────────────────────────────────────
  텍스트 기반 다이어그램 문법으로 실행 순서·분기·복귀를 표현.
  노드는 둥근 흰 카드 + 역할 배지(준비/화면/검증/메인/출력) + 제목 + 한 줄 설명 + 입체 그림자.
  ⚠️ 유일한 외부 의존성: Mermaid CDN (아래 <script src> 1줄). 오프라인 사용 시
     mermaid.min.js 를 로컬에 받아 경로만 바꾸면 됩니다.
  ⚠️ 노드 라벨에 HTML(배지/제목/설명)을 쓰므로 securityLevel:"loose" 필요.
  재사용 시: ".viz-card"/".mermaid" + 라벨 CSS(.nw/.nb/.tnode) + 엣지 CSS + 아래 JS + CDN 1줄.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mermaid 흐름도 · Sample</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:860px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — Mermaid 시각화 카드 ===== */
.viz-card{padding:22px 18px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow);overflow-x:auto;}
.viz-card__title{margin:0 0 14px;font-weight:800;color:#1d3a63;text-align:center;}
.mermaid{display:flex;justify-content:center;min-height:60px;}
.mermaid svg{max-width:100%;height:auto;}
.viz-note{margin:18px 0 0;color:#56657a;font-size:.92rem;}
.viz-note code{background:#e7edfb;padding:1px 6px;border-radius:5px;}

/* ===== 노드 라벨(HTML): 배지 + 제목 + 설명 ===== */
.nw{display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 12px;font-family:var(--font);line-height:1.3;}
.nw b{font-size:15px;font-weight:800;color:#1c2233;}
.nd{font-size:12px;color:#64748b;font-weight:500;}
.nb{font-size:11px;font-weight:800;border-radius:999px;padding:3px 11px;letter-spacing:.02em;}
.r-prep{background:#fef3c7;color:#b45309;}
.r-screen{background:#dbeafe;color:#1d4ed8;}
.r-check{background:#ffe4e6;color:#be123c;}
.r-main{background:#d1fae5;color:#0b7250;}
.r-out{background:#ffedd5;color:#c2410c;}
/* 시작/끝(스타디움) 라벨: 좌우 패딩 + 줄바꿈 금지 + 라벨박스 클리핑 해제로 마지막 글자(s) 잘림 방지 */
.tnode{display:inline-block;white-space:nowrap;padding:0 10px;font-weight:800;font-size:15px;color:#1c2233;}
.mermaid svg .node foreignObject{overflow:visible;}

/* ===== 엣지: 부드러운 진회색 + 둥근 화살표 ===== */
.mermaid svg .edgePaths .path,.mermaid svg .flowchart-link{stroke:#64748b !important;stroke-width:2px !important;}
.mermaid svg .marker,.mermaid svg marker path{fill:#64748b !important;stroke:#64748b !important;}
.mermaid svg .edgeLabel{background:transparent !important;}
.mermaid svg .edgeLabel rect{fill:transparent !important;}
.mermaid svg .edgeLabel foreignObject div,.mermaid svg .edgeLabel span,.mermaid svg .edgeLabel p{
  background:#eef2f7 !important;border-radius:6px !important;padding:2px 9px !important;color:#334155 !important;font-weight:700 !important;font-size:12px !important;font-family:var(--font) !important;}

/* ===== 노드 카드: 둥근 모서리 + 입체 그림자 ===== */
.mermaid svg .node rect{rx:14px !important;ry:14px !important;
  filter:drop-shadow(0 2px 0 rgba(15,23,42,.05)) drop-shadow(0 8px 16px rgba(15,23,42,.07));}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Visuals · Mermaid 흐름도</p>
    <h1>이벤트 라이프사이클 흐름도</h1>
    <p class="lead">텍스트 문법으로 그리는 다이어그램이라 코드처럼 버전 관리됩니다. 실선=정상 경로, 점선=예외(검증 실패 복귀)로 한 장에 두 경로를 담았습니다. 각 단계는 역할 배지로 한눈에 구분됩니다.</p>

    <div class="viz-card">
      <p class="viz-card__title">실행 순서와 검증 실패 복귀 루프</p>
      <div class="mermaid" id="mm"></div>
      <p class="viz-note">점선 화살표(<code>AT SELECTION-SCREEN → Selection Screen</code>)가 핵심입니다. 검증을 통과해야만 메인 로직으로 진행합니다.</p>
    </div>
  </main>

<script>
// ===== 컴포넌트 JS — HTML 라벨 그래프 조립 후 Mermaid 렌더 =====
(function(){
  if(!window.mermaid) return;

  // 노드 라벨은 HTML(배지+제목+설명). classDef로 역할별 외곽선 색 지정.
  const GRAPH = [
    'flowchart TD',
    '  Start(["<span class=\'tnode\'>Program Starts</span>"]):::term',
    '  INIT["<div class=\'nw\'><span class=\'nb r-prep\'>준비</span><b>INITIALIZATION</b><span class=\'nd\'>화면 기본값 세팅</span></div>"]:::prep',
    '  Screen["<div class=\'nw\'><span class=\'nb r-screen\'>화면</span><b>Selection Screen</b><span class=\'nd\'>⏳ 사용자 입력 대기</span></div>"]:::screen',
    '  ASS["<div class=\'nw\'><span class=\'nb r-check\'>검증</span><b>AT SELECTION-SCREEN</b><span class=\'nd\'>입력값 유효성 검사</span></div>"]:::check',
    '  SOS["<div class=\'nw\'><span class=\'nb r-main\'>메인</span><b>START-OF-SELECTION</b><span class=\'nd\'>DB 조회·가공</span></div>"]:::main',
    '  EOS["<div class=\'nw\'><span class=\'nb r-out\'>출력</span><b>END-OF-SELECTION</b><span class=\'nd\'>결과 출력·마감</span></div>"]:::out',
    '  Ends(["<span class=\'tnode\'>Program Ends</span>"]):::term',
    '  Start --> INIT --> Screen',
    '  Screen -->|입력 발생| ASS',
    '  ASS -.->|에러 시 복귀| Screen',
    '  ASS -->|통과 + F8| SOS',
    '  SOS --> EOS --> Ends',
    'classDef term fill:#eef2ff,stroke:#94a3b8,stroke-width:2px,color:#1c2233;',
    'classDef prep fill:#ffffff,stroke:#f59e0b,stroke-width:2px;',
    'classDef screen fill:#ffffff,stroke:#3b5bdb,stroke-width:2.5px;',
    'classDef check fill:#ffffff,stroke:#e11d48,stroke-width:2px;',
    'classDef main fill:#ffffff,stroke:#10b981,stroke-width:2px;',
    'classDef out fill:#ffffff,stroke:#fb923c,stroke-width:2px;'
  ].join('\n');

  document.getElementById('mm').textContent = GRAPH;

  mermaid.initialize({
    startOnLoad:false, securityLevel:'loose', theme:'base',
    themeVariables:{ fontFamily:'inherit' },
    flowchart:{ curve:'basis', htmlLabels:true, nodeSpacing:48, rankSpacing:46, padding:10 }
  });
  mermaid.run({ nodes: document.querySelectorAll('.mermaid') }).then(()=>{
    // 라벨 없는 엣지(시작→INIT 등)의 빈 라벨 상자 숨김
    // — 엣지 라벨 배경 알약 때문에 빈 회색 박스로 보이던 문제 제거
    document.querySelectorAll('.mermaid .edgeLabel').forEach(el=>{
      if(!el.textContent.trim()) el.style.display = 'none';
    });
  });
})();
</script>
</body>
</html>
