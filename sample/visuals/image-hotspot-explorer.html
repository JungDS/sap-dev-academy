<!DOCTYPE html>
<!--
  이미지 핫스팟 탐색기 (Image Hotspot Explorer) — standalone
  ────────────────────────────────────────────────────────────
  화면(여기선 자체 SVG로 그린 SE38 목업) 위에 핫스팟 점을 얹고,
  점을 누르면 그 UI 요소의 설명 툴팁이 뜸. 실제 스크린샷이 있으면
  .hotspot-stage 의 SVG 대신 <img>로 교체하고 핫스팟 좌표(%)만 맞추면 됩니다.
  외부 의존성 없음. 재사용 시 ".hotspot*" CSS + 하단 JS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이미지 핫스팟 탐색기 · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;--mono:'D2Coding',Consolas,Monaco,monospace;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:820px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — 핫스팟 탐색기 ===== */
.hotspot-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.hotspot-stage{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
.hotspot-stage svg,.hotspot-stage img{display:block;width:100%;height:auto;}
.hotspot{position:absolute;width:26px;height:26px;border-radius:50%;background:rgba(59,91,219,.45);border:2px solid var(--brand);transform:translate(-50%,-50%);cursor:pointer;display:grid;place-items:center;color:#fff;font-weight:800;font-size:.8rem;transition:transform .15s,background .15s;animation:pulse 2s infinite;}
.hotspot:hover,.hotspot.active{background:var(--brand);transform:translate(-50%,-50%) scale(1.18);animation:none;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,91,219,.4);}50%{box-shadow:0 0 0 7px rgba(59,91,219,0);}}
.hotspot-tip{margin-top:14px;padding:14px 16px;border-radius:10px;background:#eef2ff;border:1px solid #d7e1f5;min-height:48px;}
.hotspot-tip strong{color:#26336b;}
.hotspot-tip p{margin:4px 0 0;color:#3a4256;font-size:.92rem;}
.hotspot-tip code{background:#dde6fb;padding:1px 6px;border-radius:5px;font-family:var(--mono);font-size:.88em;}
.hotspot-tip .ph{color:#7c89a8;}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Visuals · 이미지 핫스팟</p>
    <h1>화면 위 핫스팟으로 UI 익히기</h1>
    <p class="lead">SE38 에디터 화면(자체 SVG 목업) 위의 번호 점을 눌러 각 영역의 역할을 확인하세요. 실제 스크린샷으로 교체해도 동일하게 동작합니다.</p>

    <div class="hotspot-card" data-hotspot>
      <div class="hotspot-stage">
        <!-- 자체 SVG 목업 (실제 스크린샷으로 교체 가능) -->
        <svg viewBox="0 0 600 320" role="img" aria-label="SE38 에디터 목업">
          <rect width="600" height="320" fill="#eef1f6"/>
          <rect x="0" y="0" width="600" height="34" fill="#2c3666"/>
          <rect x="0" y="32" width="600" height="2" fill="#3b5bdb"/>
          <circle cx="16" cy="17" r="5" fill="#ff5f56"/><circle cx="33" cy="17" r="5" fill="#ffbd2e"/><circle cx="50" cy="17" r="5" fill="#27c93f"/>
          <text x="68" y="22" font-size="12" fill="#ffa03b" font-weight="700" letter-spacing="1">ABAP</text>
          <text x="108" y="22" font-size="12" fill="#e7ebff" font-weight="600">SE38 · ABAP Editor — ZDEMO</text>
          <rect x="0" y="34" width="600" height="30" fill="#dfe5ee"/>
          <rect x="12" y="40" width="80" height="18" rx="3" fill="#fff" stroke="#aeb8c8"/>
          <text x="20" y="53" font-size="11" fill="#444">ZDEMO</text>
          <rect x="100" y="40" width="44" height="18" rx="3" fill="#3b5bdb"/>
          <text x="108" y="53" font-size="11" fill="#fff">실행</text>
          <rect x="0" y="64" width="46" height="256" fill="#eef1f8"/>
          <g font-family="'D2Coding',monospace" font-size="12" fill="#9aa3b2">
            <text x="20" y="92">1</text><text x="20" y="112">2</text><text x="20" y="132">3</text>
            <text x="20" y="152">4</text><text x="20" y="172">5</text><text x="20" y="192">6</text>
          </g>
          <g font-family="'D2Coding',monospace" font-size="12" fill="#334155" xml:space="preserve">
            <text x="58" y="92"><tspan fill="#005cc5" font-weight="700">REPORT</tspan> zdemo.</text>
            <text x="58" y="132"><tspan fill="#005cc5" font-weight="700">START-OF-SELECTION.</tspan></text>
            <text x="58" y="152">  <tspan fill="#005cc5" font-weight="700">SELECT</tspan> * <tspan fill="#005cc5" font-weight="700">FROM</tspan> pa0001</text>
            <text x="58" y="172">    <tspan fill="#005cc5" font-weight="700">INTO TABLE</tspan> @DATA(lt).</text>
            <text x="58" y="192">  <tspan fill="#005cc5" font-weight="700">WRITE</tspan> / lines( lt ).</text>
          </g>
          <rect x="0" y="290" width="600" height="30" fill="#dfe5ee"/>
          <text x="14" y="309" font-size="11" fill="#555">상태바: 준비됨</text>
        </svg>
        <!-- 핫스팟 (좌표는 stage 대비 %) -->
        <button class="hotspot" style="left:16%;top:10.5%" data-title="객체 이름 입력" data-desc="실행할 프로그램(리포트)의 이름을 입력하는 칸입니다. 여기서 <code>ZDEMO</code>를 입력합니다."></button>
        <button class="hotspot" style="left:20%;top:15.3%" data-title="실행 버튼 (F8)" data-desc="작성한 프로그램을 실행합니다. 키보드 <code>F8</code>과 동일합니다."></button>
        <button class="hotspot" style="left:4%;top:40%" data-title="줄 번호 거터" data-desc="각 코드 줄의 번호 영역. 디버거 중단점(breakpoint)을 여기 클릭해 설정합니다."></button>
        <button class="hotspot" style="left:34%;top:47%" data-title="이벤트 블록" data-desc="<code>START-OF-SELECTION</code> — 실제 DB 조회/가공이 시작되는 메인 이벤트입니다."></button>
        <button class="hotspot" style="left:6%;top:94%" data-title="상태바" data-desc="실행 결과·에러·시스템 메시지가 표시되는 영역. <code>sy-msgid</code> 메시지가 여기 뜹니다."></button>
      </div>
      <div class="hotspot-tip"><span class="ph">번호 점을 클릭하면 해당 영역 설명이 여기 표시됩니다.</span></div>
    </div>
  </main>

<script>
// ===== 컴포넌트 JS — 핫스팟 탐색기 =====
(function(){
  document.querySelectorAll("[data-hotspot]").forEach(card=>{
    const spots=card.querySelectorAll(".hotspot");
    const tip=card.querySelector(".hotspot-tip");
    spots.forEach((sp,i)=>{
      sp.textContent=i+1;
      const show=()=>{
        spots.forEach(s=>s.classList.remove("active")); sp.classList.add("active");
        tip.innerHTML=`<strong>${i+1}. ${sp.dataset.title}</strong><p>${sp.dataset.desc}</p>`;
      };
      sp.addEventListener("click",show);
      sp.addEventListener("mouseenter",show);
    });
  });
})();
</script>
</body>
</html>
