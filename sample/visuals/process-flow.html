<!DOCTYPE html>
<!--
  프로세스 플로우 (Process Flow) — standalone
  ────────────────────────────────────────────────────────────
  단계 박스 + 화살표로 순차 흐름을 한 줄에 표현(반응형: 좁아지면 세로).
  순수 CSS, JS 없음. 재사용 시 ".pflow*" CSS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>프로세스 플로우 · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:880px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}

/* ===== 컴포넌트 CSS — 프로세스 플로우 ===== */
.pflow-card{background:#f7fbff;border:1px solid #d9e6f5;border-radius:14px;padding:22px;box-shadow:var(--shadow);}
.pflow-card__title{margin:0 0 16px;font-weight:800;color:#1d3a63;}
.pflow{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;}
.pflow__step{flex:1;min-width:130px;background:#fff;border:1px solid #d7e1ee;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:4px;transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s;}
.pflow__step:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(20,28,51,.10);}
.pflow__step .badge{align-self:flex-start;font-size:.66rem;font-weight:800;color:#fff;border-radius:999px;padding:2px 8px;text-transform:uppercase;letter-spacing:.4px;}
.pflow__step strong{color:#12365f;}
.pflow__step span{color:var(--ink-soft);font-size:.88rem;}
.pflow__arrow{display:flex;align-items:center;color:var(--brand);font-weight:900;font-size:1.3rem;}
.b1{background:#3b5bdb;} .b2{background:#0ca678;} .b3{background:#6d28d9;} .b4{background:#f59e0b;}
@media (max-width:640px){ .pflow{flex-direction:column;} .pflow__arrow{transform:rotate(90deg);justify-content:center;} }
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Visuals · 프로세스 플로우</p>
    <h1>리포트 실행 4단계 흐름</h1>
    <p class="lead">순차적 처리 단계를 박스 + 화살표로 한눈에. 좁은 화면에선 자동으로 세로 흐름이 됩니다.</p>

    <div class="pflow-card">
      <p class="pflow-card__title">선택 화면 → 조회 → 가공 → 출력</p>
      <div class="pflow">
        <div class="pflow__step"><span class="badge b1">1 입력</span><strong>Selection Screen</strong><span>사용자가 사번·기간 입력 후 F8</span></div>
        <div class="pflow__arrow">→</div>
        <div class="pflow__step"><span class="badge b2">2 조회</span><strong>SELECT</strong><span>DB에서 내부 테이블로 조회</span></div>
        <div class="pflow__arrow">→</div>
        <div class="pflow__step"><span class="badge b3">3 가공</span><strong>LOOP / 계산</strong><span>집계·정렬 등 비즈니스 로직</span></div>
        <div class="pflow__arrow">→</div>
        <div class="pflow__step"><span class="badge b4">4 출력</span><strong>ALV 표시</strong><span>cl_salv_table로 결과 화면</span></div>
      </div>
    </div>
  </main>
</body>
</html>
