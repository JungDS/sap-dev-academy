<!DOCTYPE html>
<!--
  카드 분류 퀴즈 (Card Sorting) — standalone
  ────────────────────────────────────────────────────────────
  여러 카드를 알맞은 그룹 칸으로 드래그해 분류 → "확인"으로 채점.
  카드: .cs-card[data-cat], 그룹: .cs-zone[data-cat]. 외부 의존성 없음(컨페티 내장).
  재사용 시 ".cs*"/".confetti-canvas" CSS + 하단 JS만 가져가면 됩니다.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카드 분류 퀴즈 · Sample</title>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#1c2233;--ink-soft:#5b6478;--line:#e6e8ef;--brand:#3b5bdb;--accent:#0ca678;--red:#d6336c;--radius:14px;--shadow:0 1px 2px rgba(20,28,51,.04),0 8px 24px rgba(20,28,51,.06);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,sans-serif;--mono:'D2Coding',Consolas,Monaco,monospace;}
*{box-sizing:border-box;} html,body{margin:0;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.65;}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--surface);}
.topbar__inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:800;}
.brand__mark{width:28px;height:28px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;}
.wrap{max-width:760px;margin:28px auto 72px;padding:0 24px;}
.eyebrow{color:var(--brand);font-weight:800;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;}
h1{font-size:1.7rem;margin:8px 0 6px;} .lead{color:var(--ink-soft);margin:0 0 24px;}
.btn{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:9px;padding:10px 18px;font-weight:700;cursor:pointer;font:inherit;}
.btn:hover{background:#2f4bc0;}

/* ===== 컴포넌트 CSS — 카드 분류 ===== */
.cs{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow);}
.cs__q{font-weight:700;margin:0 0 16px;}
.cs__pool{display:flex;flex-wrap:wrap;gap:10px;background:#f1f4fb;padding:14px;border-radius:12px;min-height:56px;align-items:center;margin-bottom:16px;}
.cs__zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px;}
.cs-zone{background:#f8fafc;border:2px dashed #cfd6e6;border-radius:12px;padding:12px;min-height:120px;display:flex;flex-direction:column;gap:8px;transition:all .2s;}
.cs-zone.over{border-color:var(--brand);background:#eef2ff;}
.cs-zone__label{text-align:center;font-size:.74rem;font-weight:800;color:#26336b;text-transform:uppercase;letter-spacing:.4px;}
.cs-card{background:#fff;border:1px solid #cfd6e6;border-radius:8px;padding:7px 14px;font-family:var(--mono);font-size:.85rem;font-weight:700;color:#334155;cursor:grab;box-shadow:0 3px 6px rgba(0,0,0,.05);user-select:none;transition:all .15s;}
.cs-card:hover{border-color:var(--brand);color:var(--brand);}
.cs-card.dragging{opacity:.4;}
.cs-card.ok{border-color:var(--accent);background:#eafaf3;color:#0b7250;}
.cs-card.no{border-color:var(--red);background:#ffe3ec;color:#b02a55;}
.cs__feedback{margin-top:6px;padding:12px 16px;border-radius:10px;font-size:.95rem;display:none;}
.cs__feedback.success{display:block;background:#eafaf3;border:1px solid #bfead7;color:#0b7250;}
.cs__feedback.error{display:block;background:#ffe3ec;border:1px solid #f6c2d4;color:#b02a55;}
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9999;}
</style>
</head>
<body>
  <header class="topbar"><div class="topbar__inner"><span class="brand__mark">A</span>SAP Developer Academy</div></header>
  <main class="wrap">
    <p class="eyebrow">Quizzes · 카드 분류</p>
    <h1>구문을 종류별로 분류하기</h1>
    <p class="lead">아래 카드를 알맞은 그룹으로 끌어다 놓고 "확인"을 누르세요. 모두 맞으면 축하 효과가 나타납니다.</p>

    <div class="cs" data-cs data-success="✓ <strong>완벽 분류!</strong> 선언/조회/출력 구문을 모두 정확히 나눴습니다.">
      <p class="cs__q">Q. 각 ABAP 구문을 역할에 맞는 그룹으로 분류하세요.</p>
      <div class="cs__pool">
        <div class="cs-card" draggable="true" data-cat="decl">DATA</div>
        <div class="cs-card" draggable="true" data-cat="read">SELECT</div>
        <div class="cs-card" draggable="true" data-cat="out">WRITE</div>
        <div class="cs-card" draggable="true" data-cat="decl">TYPES</div>
        <div class="cs-card" draggable="true" data-cat="read">READ TABLE</div>
        <div class="cs-card" draggable="true" data-cat="out">cl_salv_table</div>
      </div>
      <div class="cs__zones">
        <div class="cs-zone" data-cat="decl"><span class="cs-zone__label">선언 (Declaration)</span></div>
        <div class="cs-zone" data-cat="read"><span class="cs-zone__label">조회 (Read)</span></div>
        <div class="cs-zone" data-cat="out"><span class="cs-zone__label">출력 (Output)</span></div>
      </div>
      <button class="btn" data-check>확인</button>
      <div class="cs__feedback"></div>
    </div>
  </main>

<script>
// ===== 컴포넌트 JS — 카드 분류 + 컨페티 =====
(function(){
  function confetti(){
    const c=document.createElement("canvas"); c.className="confetti-canvas"; document.body.appendChild(c);
    const ctx=c.getContext("2d"); const cols=["#3b5bdb","#0ca678","#f59e0b","#d6336c","#6d28d9"]; const P=[];
    const rz=()=>{c.width=innerWidth;c.height=innerHeight;}; rz(); addEventListener("resize",rz);
    for(let i=0;i<130;i++) P.push({x:Math.random()*c.width,y:Math.random()*-c.height,s:Math.random()*7+4,col:cols[i%cols.length],sp:Math.random()*4+3,a:Math.random()*360,sn:Math.random()*4-2});
    const t0=Date.now();
    (function d(){ ctx.clearRect(0,0,c.width,c.height); if(Date.now()-t0>2300){c.remove();removeEventListener("resize",rz);return;}
      P.forEach(p=>{p.y+=p.sp;p.x+=Math.sin(p.a*Math.PI/180)*1.4;p.a+=p.sn;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,7);ctx.fill();}); requestAnimationFrame(d); })();
  }
  document.querySelectorAll("[data-cs]").forEach(cs=>{
    const pool=cs.querySelector(".cs__pool");
    const zones=cs.querySelectorAll(".cs-zone");
    const fb=cs.querySelector(".cs__feedback");
    let dragged=null;
    cs.querySelectorAll(".cs-card").forEach(card=>{
      card.addEventListener("dragstart",()=>{ dragged=card; card.classList.add("dragging"); });
      card.addEventListener("dragend",()=>card.classList.remove("dragging"));
    });
    function bind(z){
      z.addEventListener("dragover",e=>{ e.preventDefault(); z.classList.add("over"); });
      z.addEventListener("dragleave",()=>z.classList.remove("over"));
      z.addEventListener("drop",()=>{ z.classList.remove("over"); if(dragged){ dragged.classList.remove("ok","no"); z.appendChild(dragged); } });
    }
    bind(pool); zones.forEach(bind);
    cs.addEventListener("click",e=>{ if(e.target.classList.contains("cs-card") && e.target.parentElement!==pool){ e.target.classList.remove("ok","no"); pool.appendChild(e.target); } });
    cs.querySelector("[data-check]").addEventListener("click",()=>{
      const inPool=pool.querySelectorAll(".cs-card").length;
      let total=0,correct=0;
      zones.forEach(z=>z.querySelectorAll(".cs-card").forEach(card=>{
        total++; const ok=card.dataset.cat===z.dataset.cat;
        card.classList.toggle("ok",ok); card.classList.toggle("no",!ok); if(ok) correct++;
      }));
      if(inPool>0){ fb.className="cs__feedback error"; fb.innerHTML=`✗ 아직 분류하지 않은 카드가 ${inPool}장 있습니다.`; }
      else if(correct===total){ fb.className="cs__feedback success"; fb.innerHTML=cs.dataset.success; confetti(); }
      else{ fb.className="cs__feedback error"; fb.innerHTML=`✗ ${total}장 중 ${correct}장만 올바른 그룹입니다. 빨간 카드를 다시 옮겨보세요.`; }
    });
  });
})();
</script>
</body>
</html>
